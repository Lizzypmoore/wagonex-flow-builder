<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0b0f1a;--sidebar:#0a0e18;--card:rgba(255,255,255,0.025);
  --border:rgba(255,255,255,0.055);--accent:#3b6cf5;--accent2:#5b8aff;--accent-dim:rgba(59,108,245,0.12);
  --text:rgba(255,255,255,0.88);--text2:rgba(255,255,255,0.48);--text3:rgba(255,255,255,0.2);
  --success:#2dd4a0;--warn:#f5a623;
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:310px;min-width:310px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#sidebar-scroll{flex:1;overflow-y:auto;padding:0 12px 12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.06) transparent;}
#sidebar-scroll::-webkit-scrollbar{width:4px;}
#sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px;}
.sidebar-header{padding:16px 14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.sidebar-logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#fff;letter-spacing:-0.2px;}
.sidebar-logo .mark{width:22px;height:22px;background:linear-gradient(135deg,var(--accent),#2952cc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:800;}
.sidebar-version{font-size:9px;color:var(--text3);background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;padding:2px 6px;margin-left:auto;font-weight:500;letter-spacing:0.5px;}

/* Tabs */
.tabs{display:flex;margin:0 12px 10px;gap:0;border-bottom:1px solid var(--border);}
.tab{flex:1;text-align:center;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;padding:8px 4px 9px;cursor:pointer;color:var(--text3);transition:all 0.2s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text2);}
.tab-content{display:none;}
.tab-content.active{display:flex;flex-direction:column;gap:10px;}

/* Sections */
.section{display:flex;flex-direction:column;gap:7px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;}
.section-label{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text3);font-weight:700;margin-bottom:2px;}

/* Fields */
.field-row{display:flex;flex-direction:column;gap:3px;}
.field-row label{font-size:10px;color:var(--text2);font-weight:500;}
.field-row input[type=text],.field-row input[type=number]{background:rgba(255,255,255,0.035);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:white;font-size:11px;font-family:'Inter',sans-serif;outline:none;transition:all 0.15s;}
.field-row input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,108,245,0.08);}
.slider-row{display:flex;flex-direction:column;gap:3px;}
.slider-row label{font-size:10px;color:var(--text2);display:flex;justify-content:space-between;font-weight:500;}
.slider-row label span{color:var(--accent2);font-weight:600;font-size:10px;font-variant-numeric:tabular-nums;}
.slider-row input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;height:3px;}
.pos-row{display:flex;gap:6px;align-items:center;}
.pos-row label{font-size:10px;color:var(--text3);width:12px;font-weight:600;}
.pos-row input[type=range]{flex:1;accent-color:var(--accent);height:3px;}
.pos-row input[type=number]{width:44px;background:rgba(255,255,255,0.035);border:1px solid var(--border);border-radius:5px;padding:4px;color:white;font-size:10px;font-family:'Inter',sans-serif;outline:none;text-align:center;}

/* Presets */
.presets-row{display:flex;gap:4px;flex-wrap:wrap;}
.preset-chip{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:10px;font-weight:600;color:var(--text3);transition:all 0.15s;font-family:'Inter',sans-serif;}
.preset-chip:hover{background:var(--accent-dim);color:var(--accent2);border-color:rgba(59,108,245,0.2);}
.preset-chip.active{background:var(--accent-dim);color:var(--accent2);border-color:rgba(59,108,245,0.3);}

/* Node cards */
.node-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:6px;border-left:3px solid #333;transition:border-color 0.2s;}
.node-item-header{display:flex;align-items:center;justify-content:space-between;font-size:9px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;font-weight:700;}
.node-item-header button{background:none;border:1px solid rgba(255,80,80,0.15);color:rgba(255,100,100,0.5);border-radius:4px;padding:2px 7px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;transition:all 0.15s;}
.node-item-header button:hover{background:rgba(255,60,60,0.1);color:#ff6b6b;border-color:rgba(255,80,80,0.3);}
.node-row{display:flex;gap:4px;align-items:center;}
.node-row input,.node-row select{flex:1;background:rgba(255,255,255,0.035);border:1px solid var(--border);border-radius:5px;padding:5px 7px;color:white;font-size:10px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;}
.node-row input:focus{border-color:var(--accent);}
.node-row select option{background:#0c1020;}
.color-input{width:28px!important;height:24px;padding:1px!important;border-radius:5px!important;cursor:pointer;border:1px solid var(--border)!important;background:none!important;flex:none!important;}
.pos-reset{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text3);font-size:9px;font-family:'Inter',sans-serif;padding:4px 8px;cursor:pointer;transition:all 0.15s;text-align:left;}
.pos-reset:hover{background:rgba(255,255,255,0.03);color:var(--text2);}

/* Children */
.children-section{border-top:1px solid var(--border);padding-top:6px;display:flex;flex-direction:column;gap:4px;margin-top:2px;}
.children-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:700;}
.child-item{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:6px;padding:6px 7px;display:flex;flex-direction:column;gap:4px;}
.child-row{display:flex;gap:4px;align-items:center;}
.child-row input,.child-row select{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:4px;padding:4px 6px;color:rgba(255,255,255,0.75);font-size:9px;font-family:'Inter',sans-serif;outline:none;}
.child-row select option{background:#0c1020;}
.child-row button{background:none;border:1px solid rgba(255,60,60,0.1);color:rgba(255,100,100,0.4);border-radius:3px;padding:2px 5px;cursor:pointer;font-size:8px;font-family:'Inter',sans-serif;}
.add-child-btn{background:none;border:1px dashed rgba(255,255,255,0.08);border-radius:5px;color:var(--text3);padding:4px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;text-align:center;transition:all 0.15s;}
.add-child-btn:hover{background:rgba(255,255,255,0.03);color:var(--text2);border-color:rgba(255,255,255,0.15);}
.add-node-btn{background:var(--accent-dim);border:1px solid rgba(59,108,245,0.2);border-radius:6px;color:var(--accent);padding:8px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;text-transform:uppercase;font-weight:700;letter-spacing:1px;transition:all 0.15s;}
.add-node-btn:hover{background:rgba(59,108,245,0.2);border-color:rgba(59,108,245,0.35);}

/* Brand picker */
.brand-picker-wrap{position:relative;}
.brand-selected{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.035);border:1px solid var(--border);border-radius:6px;padding:4px 7px;cursor:pointer;transition:all 0.15s;}
.brand-selected:hover{border-color:var(--accent);}
.brand-selected img{width:16px;height:16px;object-fit:contain;}
.brand-selected span{font-size:10px;color:rgba(255,255,255,0.65);flex:1;font-family:'Inter',sans-serif;}
.brand-selected .arrow{color:var(--text3);font-size:8px;}
.brand-dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#0e1328;border:1px solid rgba(255,255,255,0.1);border-radius:8px;z-index:200;max-height:170px;overflow-y:auto;display:none;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.6);}
.brand-dropdown.open{display:flex;}
.brand-search{padding:5px;border-bottom:1px solid rgba(255,255,255,0.05);}
.brand-search input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:white;font-size:10px;font-family:'Inter',sans-serif;outline:none;}
.brand-list{overflow-y:auto;}
.brand-option{display:flex;align-items:center;gap:8px;padding:5px 9px;cursor:pointer;transition:background 0.12s;}
.brand-option:hover{background:var(--accent-dim);}
.brand-option img{width:18px;height:18px;object-fit:contain;}
.brand-option span{font-size:10px;color:rgba(255,255,255,0.7);font-family:'Inter',sans-serif;}

/* Particle picker */
.particle-row{display:flex;gap:4px;align-items:center;}
.particle-row label{font-size:9px;color:var(--text3);white-space:nowrap;font-weight:500;}
.particle-input{width:34px;background:rgba(255,255,255,0.035);border:1px solid var(--border);border-radius:4px;padding:3px 4px;color:white;font-size:12px;font-family:'Inter',sans-serif;outline:none;text-align:center;}
.particle-presets{display:flex;gap:2px;flex-wrap:wrap;}
.preset-btn{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:4px;padding:2px 4px;cursor:pointer;font-size:11px;transition:all 0.12s;line-height:1;}
.preset-btn:hover{background:rgba(255,255,255,0.08);transform:scale(1.1);}

/* Bottom bar */
.btn-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;background:var(--sidebar);}
.generate-btn{background:var(--accent);border:none;border-radius:6px;color:white;padding:10px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;transition:all 0.15s;}
.generate-btn:hover{background:#3060e0;box-shadow:0 4px 16px rgba(59,108,245,0.3);}
.btn-secondary-row{display:flex;gap:4px;}
.btn-secondary{flex:1;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);padding:7px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.15s;}
.btn-secondary:hover{background:rgba(255,255,255,0.04);color:var(--text2);border-color:rgba(255,255,255,0.12);}
.btn-secondary.ready{color:var(--text);border-color:rgba(255,255,255,0.15);}
#status{font-size:9px;color:var(--text3);text-align:center;min-height:12px;font-weight:500;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;position:relative;background:var(--bg);}
#preview-header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.preview-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-weight:600;}
.preview-badge{font-size:9px;color:var(--text3);letter-spacing:0.5px;font-weight:500;}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;}
canvas#preview{border-radius:10px;border:1px solid var(--border);max-width:100%;max-height:100%;}

.fullscreen #sidebar,.fullscreen #preview-header{display:none;}
.fullscreen #canvas-wrap{padding:0;}
.fullscreen canvas#preview{border-radius:0;border:none;max-width:100vw;max-height:100vh;}
#fs-exit{display:none;position:fixed;top:14px;right:14px;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:white;padding:7px 12px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;z-index:999;font-weight:600;}
.fullscreen #fs-exit{display:block;}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo"><div class="mark">W</div>Wagonex Builder</div>
    <div class="sidebar-version">v2.0</div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="tab-text" onclick="switchTab(this)">Content</div>
    <div class="tab" data-tab="tab-layout" onclick="switchTab(this)">Layout</div>
    <div class="tab" data-tab="tab-nodes" onclick="switchTab(this)">Nodes</div>
  </div>
  <div id="sidebar-scroll">
    <div class="tab-content active" id="tab-text">
      <div class="section">
        <div class="section-label">Copy</div>
        <div class="field-row"><label>Headline</label><input type="text" id="headline" value="Ready to grow?" oninput="redraw()"></div>
        <div class="field-row"><label>Subheading</label><input type="text" id="subheading" value="Add partners and watch your reach expand" oninput="redraw()"></div>
        <div class="field-row"><label>Centre Label</label><input type="text" id="centerName" value="WAGONEX" oninput="redraw()"></div>
        <div class="field-row"><label>Footer</label><input type="text" id="tagline" value="SAME PLATFORM · NEW REVENUE STREAMS" oninput="redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Quick Presets</div>
        <div class="presets-row">
          <button class="preset-chip active" onclick="applyPreset('default',this)">Default</button>
          <button class="preset-chip" onclick="applyPreset('growth',this)">Growth</button>
          <button class="preset-chip" onclick="applyPreset('partners',this)">Partners</button>
          <button class="preset-chip" onclick="applyPreset('minimal',this)">Minimal</button>
        </div>
      </div>
    </div>
    <div class="tab-content" id="tab-layout">
      <div class="section">
        <div class="section-label">Centre Position</div>
        <div class="pos-row"><label>X</label><input type="range" id="cxSlider" min="10" max="90" value="50" oninput="redraw()"><input type="number" id="cxNum" min="10" max="90" value="50" oninput="document.getElementById('cxSlider').value=this.value;redraw()"></div>
        <div class="pos-row"><label>Y</label><input type="range" id="cySlider" min="10" max="90" value="50" oninput="redraw()"><input type="number" id="cyNum" min="10" max="90" value="50" oninput="document.getElementById('cySlider').value=this.value;redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Dimensions</div>
        <div class="slider-row"><label>Orbit Radius <span id="radiusVal">34%</span></label><input type="range" id="orbitRadius" min="20" max="48" value="34" oninput="document.getElementById('radiusVal').textContent=this.value+'%';redraw()"></div>
        <div class="slider-row"><label>Node Size <span id="nodeSizeVal">28px</span></label><input type="range" id="nodeSize" min="16" max="52" value="28" oninput="document.getElementById('nodeSizeVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Centre Size <span id="centerSizeVal">40px</span></label><input type="range" id="centerSize" min="24" max="70" value="40" oninput="document.getElementById('centerSizeVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Child Distance <span id="childOrbitVal">55px</span></label><input type="range" id="childOrbit" min="30" max="120" value="55" oninput="document.getElementById('childOrbitVal').textContent=this.value+'px';redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Connections</div>
        <div class="slider-row"><label>Line Weight <span id="lineWidthVal">1.0px</span></label><input type="range" id="lineWidth" min="0.5" max="6" step="0.5" value="1" oninput="document.getElementById('lineWidthVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Line Opacity <span id="lineOpVal">35%</span></label><input type="range" id="lineOpacity" min="5" max="100" value="35" oninput="document.getElementById('lineOpVal').textContent=this.value+'%';redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Particles</div>
        <div class="slider-row"><label>Size <span id="particleSizeVal">12px</span></label><input type="range" id="particleSize" min="8" max="28" value="12" oninput="document.getElementById('particleSizeVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Speed <span id="flowSpeedVal">1.0x</span></label><input type="range" id="flowSpeed" min="1" max="20" value="5" oninput="document.getElementById('flowSpeedVal').textContent=(this.value/5).toFixed(1)+'x'"></div>
        <div class="slider-row"><label>Frequency <span id="spawnRateVal">900ms</span></label><input type="range" id="spawnRate" min="200" max="3000" step="100" value="900" oninput="document.getElementById('spawnRateVal').textContent=this.value+'ms';restartSpawners()"></div>
      </div>
    </div>
    <div class="tab-content" id="tab-nodes">
      <div id="nodes-container"></div>
      <button class="add-node-btn" onclick="addNode()">+ Add Node</button>
    </div>
  </div>
  <div class="btn-row">
    <button class="generate-btn" onclick="startAnimation()">▶ Preview</button>
    <div class="btn-secondary-row">
      <button class="btn-secondary" id="dl-btn" onclick="exportGif()">⬇ Export GIF</button>
      <button class="btn-secondary" onclick="toggleFullscreen()">⛶ Present</button>
      <button class="btn-secondary" onclick="resetAll()">↺ Reset</button>
    </div>
    <div id="status"></div>
  </div>
</div>

<div id="main">
  <div id="preview-header">
    <div class="preview-title">Live Preview</div>
    <div class="preview-badge">Drag nodes to reposition</div>
  </div>
  <div id="canvas-wrap">
    <canvas id="preview" width="660" height="660"></canvas>
  </div>
  <button id="fs-exit" onclick="toggleFullscreen()">✕ Exit</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
const CV=document.getElementById('preview');
const DPR=window.devicePixelRatio||2;
const W=660,H=660;
CV.width=W*DPR;CV.height=H*DPR;
CV.style.width=W+'px';CV.style.height=H+'px';
const ctx=CV.getContext('2d');
ctx.scale(DPR,DPR);
const COLORS=['#2dd4a0','#5b8aff','#a77bfa','#f59e42','#facc15','#f472b6','#60a5fa','#4ade80'];
const PARTICLE_PRESETS=['🚗','👤','📦','🔗','⭐','🏷️','💼','🔑','📋','🚙','🏎️','🚐','💰','💵','💳','🪙'];


let nodes=[],parts=[],visibleNodes=[],visibleChildren=[];
let rafId=null,nodeRevealIdx=0,spawnTimers=[],gifReady=false;
let customCenterPos=null,nodeCustomPos={},childCustomPos={};
let dragging=null,animTime=0;

function switchTab(el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById(el.dataset.tab).classList.add('active');}
function toggleFullscreen(){document.body.classList.toggle('fullscreen');}
function resetAll(){nodes=defaultNodes();customCenterPos=null;nodeCustomPos={};childCustomPos={};document.getElementById('cxSlider').value=50;document.getElementById('cxNum').value=50;document.getElementById('cySlider').value=50;document.getElementById('cyNum').value=50;renderNodeUI();startAnimation();}
function applyPreset(name,el){
  document.querySelectorAll('.preset-chip').forEach(c=>c.classList.remove('active'));if(el)el.classList.add('active');
  const p={default:{h:'Ready to grow?',s:'Add partners and watch your reach expand',t:'SAME PLATFORM · NEW REVENUE STREAMS'},growth:{h:'Scale your network',s:'Every new connection multiplies your reach',t:'EXPONENTIAL GROWTH · ZERO FRICTION'},partners:{h:'Partner ecosystem',s:'Seamless integration with your dealer network',t:'ONE PLATFORM · INFINITE POSSIBILITIES'},minimal:{h:'Wagonex',s:'The subscription platform',t:''}}[name];
  if(!p)return;document.getElementById('headline').value=p.h;document.getElementById('subheading').value=p.s;document.getElementById('tagline').value=p.t;redraw();
}

function defaultNodes(){
  return [
    {label:'Ford Dealer',sub:'Branded storefront',color:'#2dd4a0',flow:'both',particleIcon:'🚗',particleIconIn:'💰',children:[{label:'Sub Broker',sub:'Referral partner',color:'#2dd4a0',flow:'out',particleIcon:'🚗',particleIconIn:'💰'}]},
    {label:'BMW Broker',sub:'Your storefront',color:'#5b8aff',flow:'out',particleIcon:'🚗',particleIconIn:'🚗',children:[]},
    {label:'Network',sub:'Full visibility',color:'#a77bfa',flow:'in',particleIcon:'📋',particleIconIn:'📋',children:[]},
    {label:'Customer',sub:'Seamless experience',color:'#f59e42',flow:'both',particleIcon:'👤',particleIconIn:'💰',children:[]},
    {label:'Affiliate',sub:'Tracked referral',color:'#facc15',flow:'out',particleIcon:'🔗',particleIconIn:'🔗',children:[]},
  ];
}

function getS(){
  const cxPct=parseFloat(document.getElementById('cxSlider').value)/100,cyPct=parseFloat(document.getElementById('cySlider').value)/100;
  return{cx:customCenterPos?customCenterPos.x:W*cxPct,cy:customCenterPos?customCenterPos.y:H*cyPct,orbitR:parseFloat(document.getElementById('orbitRadius').value)/100,nodeR:parseInt(document.getElementById('nodeSize').value),centerR:parseInt(document.getElementById('centerSize').value),lineW:parseFloat(document.getElementById('lineWidth').value),lineOp:parseInt(document.getElementById('lineOpacity').value)/100,childOrbit:parseInt(document.getElementById('childOrbit').value),particleR:parseInt(document.getElementById('particleSize').value)/2,headline:document.getElementById('headline').value,subheading:document.getElementById('subheading').value,centerName:document.getElementById('centerName').value||'WAGONEX',tagline:document.getElementById('tagline').value};
}
function getFlowSpeed(){return parseFloat(document.getElementById('flowSpeed').value)/5;}
function getSpawnRate(){return parseInt(document.getElementById('spawnRate').value);}
function getNodePos(i,cx,cy,orbitR,count){if(nodeCustomPos[i])return nodeCustomPos[i];const a=(i/count)*Math.PI*2-Math.PI/2;return{x:cx+Math.cos(a)*orbitR,y:cy+Math.sin(a)*orbitR};}
function getChildPos(ni,ci,px,py,cx,cy,childOrbit,total){const key=`${ni}_${ci}`;if(childCustomPos[key])return childCustomPos[key];const ba=Math.atan2(py-cy,px-cx);const sp=Math.min(Math.PI*0.7,(total-1)*0.5);const t=total===1?0:(ci/(total-1)-0.5);const a=ba+t*sp;return{x:px+Math.cos(a)*childOrbit,y:py+Math.sin(a)*childOrbit};}

// Drag
function getCanvasXY(e){const r=CV.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
function hitTest(mx,my){const s=getS();if(Math.hypot(mx-s.cx,my-s.cy)<s.centerR+14)return{type:'center'};for(let i=0;i<visibleNodes.length;i++){const p=getNodePos(i,s.cx,s.cy,Math.min(W,H)*s.orbitR,visibleNodes.length);if(Math.hypot(mx-p.x,my-p.y)<s.nodeR+14)return{type:'node',ni:i};const ch=visibleChildren[i]||[];for(let j=0;j<ch.length;j++){const cp=getChildPos(i,j,p.x,p.y,s.cx,s.cy,s.childOrbit,ch.length);if(Math.hypot(mx-cp.x,my-cp.y)<s.nodeR*0.55+12)return{type:'child',ni:i,ci:j};}}return null;}
CV.addEventListener('mousedown',e=>{const{x,y}=getCanvasXY(e);const hit=hitTest(x,y);if(hit){dragging={...hit};CV.style.cursor='grabbing';}});
CV.addEventListener('mousemove',e=>{const{x,y}=getCanvasXY(e);if(dragging){if(dragging.type==='center'){customCenterPos={x,y};document.getElementById('cxSlider').value=Math.round(x/W*100);document.getElementById('cxNum').value=Math.round(x/W*100);document.getElementById('cySlider').value=Math.round(y/H*100);document.getElementById('cyNum').value=Math.round(y/H*100);}else if(dragging.type==='node')nodeCustomPos[dragging.ni]={x,y};else if(dragging.type==='child')childCustomPos[`${dragging.ni}_${dragging.ci}`]={x,y};redraw();}else{CV.style.cursor=hitTest(x,y)?'grab':'default';}});
CV.addEventListener('mouseup',()=>{dragging=null;CV.style.cursor='default';});
CV.addEventListener('mouseleave',()=>{dragging=null;});
CV.addEventListener('touchstart',e=>{e.preventDefault();const{x,y}=getCanvasXY(e.touches[0]);const hit=hitTest(x,y);if(hit)dragging={...hit};},{passive:false});
CV.addEventListener('touchmove',e=>{e.preventDefault();const{x,y}=getCanvasXY(e.touches[0]);if(dragging){if(dragging.type==='center')customCenterPos={x,y};else if(dragging.type==='node')nodeCustomPos[dragging.ni]={x,y};else if(dragging.type==='child')childCustomPos[`${dragging.ni}_${dragging.ci}`]={x,y};redraw();}},{passive:false});
CV.addEventListener('touchend',()=>{dragging=null;});

document.addEventListener('click',()=>{});

function buildIconPicker(labelTxt,val,onChange){const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;gap:3px;';const row=document.createElement('div');row.className='particle-row';const lbl=document.createElement('label');lbl.textContent=labelTxt;const inp=document.createElement('input');inp.className='particle-input';inp.value=val||'🚗';inp.maxLength=2;inp.oninput=()=>{onChange(inp.value);redraw();};row.appendChild(lbl);row.appendChild(inp);const pp=document.createElement('div');pp.className='particle-presets';PARTICLE_PRESETS.forEach(e=>{const pb=document.createElement('button');pb.className='preset-btn';pb.textContent=e;pb.onclick=()=>{onChange(e);inp.value=e;redraw();};pp.appendChild(pb);});wrap.appendChild(row);wrap.appendChild(pp);return wrap;}

// Node UI rendering
function renderNodeUI(){
  const c=document.getElementById('nodes-container');c.innerHTML='';
  nodes.forEach((n,i)=>{
    const d=document.createElement('div');d.className='node-item';d.style.borderLeftColor=n.color;
    const hdr=document.createElement('div');hdr.className='node-item-header';hdr.innerHTML=`<span>Node ${i+1}</span>`;
    const db=document.createElement('button');db.textContent='Remove';db.onclick=()=>{nodes.splice(i,1);delete nodeCustomPos[i];renderNodeUI();redraw();};hdr.appendChild(db);d.appendChild(hdr);
    const r1=document.createElement('div');r1.className='node-row';
    const li=document.createElement('input');li.value=n.label;li.placeholder='Label';li.oninput=()=>{nodes[i].label=li.value;redraw();};
    const ci=document.createElement('input');ci.type='color';ci.value=n.color;ci.className='color-input';ci.oninput=()=>{nodes[i].color=ci.value;d.style.borderLeftColor=ci.value;redraw();};
    r1.appendChild(li);r1.appendChild(ci);d.appendChild(r1);
    const r2=document.createElement('div');r2.className='node-row';const si2=document.createElement('input');si2.value=n.sub;si2.placeholder='Sub-label';si2.oninput=()=>{nodes[i].sub=si2.value;redraw();};r2.appendChild(si2);d.appendChild(r2);
    const rpos=document.createElement('button');rpos.className='pos-reset';rpos.textContent=nodeCustomPos[i]?'📍 Custom — reset':'📍 Drag on canvas';rpos.onclick=()=>{delete nodeCustomPos[i];renderNodeUI();redraw();};d.appendChild(rpos);
    const fr=document.createElement('div');fr.className='node-row';const fl=document.createElement('label');fl.style.cssText='font-size:9px;color:rgba(255,255,255,0.35);white-space:nowrap;font-weight:500;';fl.textContent='Flow';const fs=document.createElement('select');[['both','↔ Both'],['out','→ Out'],['in','← In']].forEach(([v,t])=>{const o=document.createElement('option');o.value=v;o.textContent=t;if(n.flow===v)o.selected=true;fs.appendChild(o);});fs.onchange=()=>{nodes[i].flow=fs.value;renderNodeUI();redraw();};fr.appendChild(fl);fr.appendChild(fs);d.appendChild(fr);
    if(n.flow==='both'){d.appendChild(buildIconPicker('→ Out',n.particleIcon,v=>{nodes[i].particleIcon=v;}));d.appendChild(buildIconPicker('← In',n.particleIconIn||'💰',v=>{nodes[i].particleIconIn=v;}));}else{d.appendChild(buildIconPicker('Icon',n.particleIcon,v=>{nodes[i].particleIcon=v;}));}
    const cs=document.createElement('div');cs.className='children-section';const clbl=document.createElement('div');clbl.className='children-label';clbl.textContent=`Children (${n.children.length})`;cs.appendChild(clbl);
    n.children.forEach((ch,j)=>{
      const ci2=document.createElement('div');ci2.className='child-item';
      const cr1=document.createElement('div');cr1.className='child-row';const cli=document.createElement('input');cli.value=ch.label;cli.placeholder='Label';cli.oninput=()=>{nodes[i].children[j].label=cli.value;redraw();};const cci=document.createElement('input');cci.type='color';cci.value=ch.color;cci.className='color-input';cci.oninput=()=>{nodes[i].children[j].color=cci.value;redraw();};const cdb=document.createElement('button');cdb.textContent='✕';cdb.onclick=()=>{nodes[i].children.splice(j,1);delete childCustomPos[`${i}_${j}`];renderNodeUI();redraw();};cr1.appendChild(cli);cr1.appendChild(cci);cr1.appendChild(cdb);ci2.appendChild(cr1);
      const cr2=document.createElement('div');cr2.className='child-row';const csi=document.createElement('input');csi.value=ch.sub;csi.placeholder='Sub-label';csi.oninput=()=>{nodes[i].children[j].sub=csi.value;redraw();};cr2.appendChild(csi);ci2.appendChild(cr2);
      const cfl=document.createElement('div');cfl.className='child-row';const cfll=document.createElement('label');cfll.style.cssText='font-size:8px;color:rgba(255,255,255,0.28);white-space:nowrap;';cfll.textContent='Flow';const cfls=document.createElement('select');[['both','↔ Both'],['out','→ Out'],['in','← In']].forEach(([v,t])=>{const o=document.createElement('option');o.value=v;o.textContent=t;if(ch.flow===v)o.selected=true;cfls.appendChild(o);});cfls.onchange=()=>{nodes[i].children[j].flow=cfls.value;renderNodeUI();redraw();};cfl.appendChild(cfll);cfl.appendChild(cfls);ci2.appendChild(cfl);
      if(ch.flow==='both'){ci2.appendChild(buildIconPicker('→ Out',ch.particleIcon,v=>{nodes[i].children[j].particleIcon=v;}));ci2.appendChild(buildIconPicker('← In',ch.particleIconIn||'💰',v=>{nodes[i].children[j].particleIconIn=v;}));}else{ci2.appendChild(buildIconPicker('Icon',ch.particleIcon,v=>{nodes[i].children[j].particleIcon=v;}));}
      cs.appendChild(ci2);
    });
    const acb=document.createElement('button');acb.className='add-child-btn';acb.textContent='+ Add Child';acb.onclick=()=>{nodes[i].children.push({label:'Child',sub:'',color:n.color,flow:'out',particleIcon:'🚗',particleIconIn:'💰'});renderNodeUI();redraw();};cs.appendChild(acb);d.appendChild(cs);c.appendChild(d);
  });
}
function addNode(){const idx=nodes.length%COLORS.length;nodes.push({label:'New Node',sub:'',color:COLORS[idx],flow:'both',particleIcon:'🚗',particleIconIn:'💰',children:[]});renderNodeUI();}

// --- DRAWING (corporate style) ---
function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}

function drawLine(c,x1,y1,x2,y2,color,opacity,width){
  const rgb=hexToRgb(color);
  const g=c.createLinearGradient(x1,y1,x2,y2);
  g.addColorStop(0,`rgba(${rgb.r},${rgb.g},${rgb.b},${opacity})`);
  g.addColorStop(1,`rgba(${rgb.r},${rgb.g},${rgb.b},${opacity*0.15})`);
  c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.strokeStyle=g;c.lineWidth=width;c.stroke();
}

function drawParticle(c,x,y,r,emoji,color,alpha){
  c.save();c.globalAlpha=Math.max(0,alpha);
  const rgb=hexToRgb(color);
  // Soft glow
  const g=c.createRadialGradient(x,y,0,x,y,r*3);
  g.addColorStop(0,`rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`);g.addColorStop(1,`rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
  c.beginPath();c.arc(x,y,r*3,0,Math.PI*2);c.fillStyle=g;c.fill();
  // Body
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);
  c.fillStyle=`rgba(12,16,30,0.92)`;c.fill();
  c.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.6)`;c.lineWidth=1;c.stroke();
  c.font=`${Math.round(r*1)}px serif`;c.textAlign='center';c.textBaseline='middle';c.fillStyle='white';c.fillText(emoji,x,y);
  c.restore();
}

function drawNode(c,x,y,r,color,label,sub,alpha=1){
  c.save();c.globalAlpha=alpha;
  const rgb=hexToRgb(color);
  const pulse=0.06+Math.sin(animTime*1.8+x*0.008)*0.03;
  c.beginPath();c.arc(x,y,r+8,0,Math.PI*2);c.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${pulse})`;c.lineWidth=8;c.stroke();
  const g=c.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,`rgba(${Math.min(255,rgb.r+20)},${Math.min(255,rgb.g+20)},${Math.min(255,rgb.b+20)},0.12)`);
  g.addColorStop(1,'rgba(10,14,26,0.95)');
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle=g;c.fill();
  c.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`;c.lineWidth=1.5;c.stroke();
  const fontSize=Math.max(10,Math.round(r*0.42));
  c.font=`700 ${fontSize}px 'Inter',sans-serif`;
  c.textAlign='center';
  c.fillStyle='rgba(0,0,0,0.7)';c.fillText(label.toUpperCase(),x,y+r+15);
  c.fillStyle='rgba(255,255,255,0.95)';c.fillText(label.toUpperCase(),x,y+r+14);
  if(sub){
    const subSize=Math.max(9,Math.round(r*0.32));
    c.font=`600 ${subSize}px 'Inter',sans-serif`;
    c.fillStyle='rgba(0,0,0,0.5)';c.fillText(sub,x,y+r+27);
    c.fillStyle='rgba(255,255,255,0.45)';c.fillText(sub,x,y+r+26);
  }
  c.restore();
}

function drawCentre(c,cx,cy,cr,name){
  const p=0.08+Math.sin(animTime*1.2)*0.04;
  c.beginPath();c.arc(cx,cy,cr+14,0,Math.PI*2);c.strokeStyle=`rgba(59,108,245,${p})`;c.lineWidth=12;c.stroke();
  const g=c.createRadialGradient(cx,cy,0,cx,cy,cr);g.addColorStop(0,'#182450');g.addColorStop(1,'#0c1228');
  c.beginPath();c.arc(cx,cy,cr,0,Math.PI*2);c.fillStyle=g;c.fill();
  c.strokeStyle='rgba(59,108,245,0.55)';c.lineWidth=1.8;c.stroke();
  c.beginPath();c.arc(cx,cy,cr*0.65,0,Math.PI*2);c.strokeStyle='rgba(59,108,245,0.08)';c.lineWidth=1;c.stroke();
  c.font=`${Math.round(cr*0.5)}px serif`;c.textAlign='center';c.textBaseline='middle';c.fillStyle='white';c.fillText('⚡',cx,cy);
  c.textBaseline='alphabetic';
  const labelSize=Math.max(11,Math.round(cr*0.3));
  c.font=`800 ${labelSize}px 'Inter',sans-serif`;
  c.fillStyle='rgba(0,0,0,0.5)';c.fillText(name.toUpperCase(),cx,cy+cr+16);
  c.fillStyle='rgba(91,138,255,0.95)';c.fillText(name.toUpperCase(),cx,cy+cr+15);
}

function drawScene(vNodes,vChildren,parts){
  const s=getS();const cx=s.cx,cy=s.cy,orbitR=Math.min(W,H)*s.orbitR;
  ctx.clearRect(0,0,W,H);
  // Background
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,W*0.8);bg.addColorStop(0,'#0e1325');bg.addColorStop(1,'#080c16');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Fine crosshatch grid
  ctx.globalAlpha=0.025;ctx.strokeStyle='#fff';ctx.lineWidth=0.5;
  for(let gx=0;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(let gy=0;gy<H;gy+=40){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
  ctx.globalAlpha=1;
  // Headline
  ctx.textAlign='center';
  ctx.font=`800 24px 'Inter',sans-serif`;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(s.headline,W/2,35);
  ctx.fillStyle='rgba(255,255,255,0.95)';ctx.fillText(s.headline,W/2,34);
  ctx.font=`500 12px 'Inter',sans-serif`;ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillText(s.subheading,W/2,53);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText(s.subheading,W/2,52);
  if(!vNodes.length){ctx.textAlign='left';return;}
  const positions=vNodes.map((_,i)=>getNodePos(i,cx,cy,orbitR,vNodes.length));
  // Orbit hint — dashed circle
  ctx.beginPath();ctx.arc(cx,cy,orbitR,0,Math.PI*2);ctx.strokeStyle='rgba(59,108,245,0.035)';ctx.lineWidth=1;ctx.setLineDash([3,9]);ctx.stroke();ctx.setLineDash([]);
  // Lines — parent to centre
  vNodes.forEach((n,i)=>{const p=positions[i];drawLine(ctx,cx,cy,p.x,p.y,n.color,s.lineOp,s.lineW);});
  // Child lines + nodes
  vNodes.forEach((n,i)=>{const p=positions[i];const ch=vChildren[i]||[];ch.forEach((child,j)=>{const cp=getChildPos(i,j,p.x,p.y,cx,cy,s.childOrbit,ch.length);drawLine(ctx,p.x,p.y,cp.x,cp.y,child.color,s.lineOp*0.6,Math.max(0.5,s.lineW*0.6));drawNode(ctx,cp.x,cp.y,s.nodeR*0.5,child.color,child.label,child.sub);});});
  // Particles
  parts.forEach(p=>{
    if(p.nodeIdx>=vNodes.length)return;const pos=positions[p.nodeIdx];
    let fx,fy,tx,ty;
    if(p.toChild&&p.toPos){fx=pos.x;fy=pos.y;tx=p.toPos.x;ty=p.toPos.y;}
    else if(p.inward){fx=pos.x;fy=pos.y;tx=cx;ty=cy;}
    else{fx=cx;fy=cy;tx=pos.x;ty=pos.y;}
    const et=easeInOutCubic(p.t);const x=fx+(tx-fx)*et,y=fy+(ty-fy)*et;
    drawParticle(ctx,x,y,s.particleR,p.icon||'🚗',p.color,Math.sin(p.t*Math.PI)*0.85);
  });
  // Parent nodes
  vNodes.forEach((n,i)=>drawNode(ctx,positions[i].x,positions[i].y,s.nodeR,n.color,n.label,n.sub));
  // Centre
  drawCentre(ctx,cx,cy,s.centerR,s.centerName);
  // Footer
  if(s.tagline){ctx.font=`700 9px 'Inter',sans-serif`;ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillText(s.tagline,W/2,H-12);}
  ctx.textAlign='left';
}

function redraw(){drawScene(visibleNodes,visibleChildren,parts);}

function restartSpawners(){spawnTimers.forEach(clearInterval);spawnTimers=[];visibleNodes.forEach((n,i)=>{spawnTimers.push(setInterval(()=>spawnP(i,n.color,n.particleIcon,n.particleIconIn,n.flow),getSpawnRate()));(visibleChildren[i]||[]).forEach((ch,j)=>{spawnTimers.push(setInterval(()=>spawnChildP(i,j,ch.color,ch.particleIcon,ch.particleIconIn,ch.flow),getSpawnRate()*1.3));});});}

function startAnimation(){
  if(rafId)cancelAnimationFrame(rafId);spawnTimers.forEach(clearInterval);spawnTimers=[];
  parts=[];visibleNodes=[];visibleChildren=[];nodeRevealIdx=0;animTime=0;
  gifReady=false;document.getElementById('dl-btn').classList.remove('ready');document.getElementById('status').textContent='';
  revealNext();loop();
}

function revealNext(){
  if(nodeRevealIdx>=nodes.length)return;
  const n=nodes[nodeRevealIdx];visibleNodes.push(n);visibleChildren.push([]);const i=nodeRevealIdx;
  spawnTimers.push(setInterval(()=>spawnP(i,n.color,n.particleIcon,n.particleIconIn,n.flow),getSpawnRate()));
  spawnP(i,n.color,n.particleIcon,n.particleIconIn,n.flow);
  if(n.children.length){n.children.forEach((ch,j)=>{setTimeout(()=>{visibleChildren[i].push(ch);spawnTimers.push(setInterval(()=>spawnChildP(i,j,ch.color,ch.particleIcon,ch.particleIconIn,ch.flow),getSpawnRate()*1.3));},500+(j+1)*400);});}
  nodeRevealIdx++;const delay=700+(n.children.length*400);
  if(nodeRevealIdx<nodes.length)setTimeout(revealNext,delay);
  else setTimeout(()=>{gifReady=true;document.getElementById('dl-btn').classList.add('ready');},delay+500);
}

function spawnP(ni,color,icon,iconIn,flow){const f=flow||'both';const spd=(0.009+Math.random()*0.007)*getFlowSpeed();if(f==='out'||f==='both')parts.push({nodeIdx:ni,color,icon:icon||'🚗',t:0,speed:spd,inward:false,toChild:false});if(f==='in'||f==='both')parts.push({nodeIdx:ni,color,icon:iconIn||icon||'💰',t:0,speed:spd,inward:true,toChild:false});}

function spawnChildP(ni,ci,color,icon,iconIn,flow){const s=getS();const n=visibleNodes[ni];if(!n)return;const positions=visibleNodes.map((_,idx)=>getNodePos(idx,s.cx,s.cy,Math.min(W,H)*s.orbitR,visibleNodes.length));const p=positions[ni];const ch=visibleChildren[ni];if(!ch||!ch[ci])return;const cp=getChildPos(ni,ci,p.x,p.y,s.cx,s.cy,s.childOrbit,ch.length);const f=flow||'out';const spd=(0.012+Math.random()*0.007)*getFlowSpeed();if(f==='out'||f==='both')parts.push({nodeIdx:ni,color,icon:icon||'🚗',t:0,speed:spd,inward:false,toChild:true,toPos:cp});if(f==='in'||f==='both')parts.push({nodeIdx:ni,color,icon:iconIn||'💰',t:0,speed:spd,inward:false,toChild:false});}

function loop(){animTime+=0.016;parts=parts.filter(p=>p.t<=1);parts.forEach(p=>p.t+=p.speed);drawScene(visibleNodes,visibleChildren,parts);rafId=requestAnimationFrame(loop);}

function exportGif(){
  if(!gifReady)return;document.getElementById('status').textContent='Rendering…';
  const gifW=W*2,gifH=H*2;
  const off=document.createElement('canvas');off.width=gifW;off.height=gifH;const oc=off.getContext('2d');
  const gif=new GIF({workers:2,quality:6,width:gifW,height:gifH,workerScript:'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'});
  const total=80;const revealAt=nodes.map((_,i)=>Math.floor((i/nodes.length)*total*0.65));
  let sv=[],sch=[],sp=[],si2=0;
  for(let f=0;f<total;f++){
    animTime=f*0.05;
    while(si2<nodes.length&&revealAt[si2]<=f){sv.push(nodes[si2]);sch.push([]);si2++;}
    sv.forEach((n,i)=>{if(sch[i].length<n.children.length&&f>revealAt[i]+5)sch[i]=n.children.slice(0,sch[i].length+1);});
    if(f%5===0&&sv.length){const i=Math.floor(Math.random()*sv.length);const n=sv[i];const fl=n.flow||'both';if(fl==='out'||fl==='both')sp.push({nodeIdx:i,color:n.color,icon:n.particleIcon||'🚗',t:0,speed:0.05,inward:false,toChild:false});if(fl==='in'||fl==='both')sp.push({nodeIdx:i,color:n.color,icon:n.particleIconIn||'💰',t:0,speed:0.05,inward:true,toChild:false});}
    sp=sp.filter(p=>p.t<=1);sp.forEach(p=>p.t+=p.speed);
    drawScene(sv,sch,sp);oc.clearRect(0,0,gifW,gifH);oc.drawImage(CV,0,0,gifW,gifH);
    gif.addFrame(oc,{delay:f===total-1?2500:80,copy:true});
  }
  gif.on('finished',blob=>{document.getElementById('status').textContent='✓ Exported';const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wagonex-network.gif';a.click();setTimeout(()=>{document.getElementById('status').textContent='';},3000);});
  gif.render();
}

nodes=defaultNodes();renderNodeUI();startAnimation();
</script>
