<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0b0f1a;font-family:'Inter',sans-serif;color:rgba(255,255,255,0.88);display:flex;height:100vh;overflow:hidden;}
#sidebar{width:320px;min-width:320px;background:rgba(8,12,24,0.95);border-right:1px solid rgba(255,255,255,0.055);display:flex;flex-direction:column;overflow:hidden;}
#sidebar-scroll{flex:1;overflow-y:auto;padding:0 12px 12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.06) transparent;}
#sidebar-scroll::-webkit-scrollbar{width:4px;}
#sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px;}
.sidebar-header{padding:16px 14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.055);margin-bottom:10px;}
.sidebar-logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#fff;}
.sidebar-logo .mark{width:22px;height:22px;background:linear-gradient(135deg,#3b6cf5,#2952cc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:800;}
.sidebar-version{font-size:9px;color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.055);border-radius:4px;padding:2px 6px;margin-left:auto;font-weight:500;}
.tabs{display:flex;margin:0 12px 10px;border-bottom:1px solid rgba(255,255,255,0.055);}
.tab{flex:1;text-align:center;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;padding:8px 4px 9px;cursor:pointer;color:rgba(255,255,255,0.2);transition:all 0.2s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.active{color:#5b8aff;border-bottom-color:#3b6cf5;}
.tab:hover:not(.active){color:rgba(255,255,255,0.48);}
.tab-content{display:none;}
.tab-content.active{display:flex;flex-direction:column;gap:10px;}
.section{display:flex;flex-direction:column;gap:7px;padding:10px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.055);border-radius:8px;}
.section-label{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,0.2);font-weight:700;margin-bottom:2px;}
.field-row{display:flex;flex-direction:column;gap:3px;}
.field-row label{font-size:10px;color:rgba(255,255,255,0.48);font-weight:500;}
.field-row input[type=text]{background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.055);border-radius:6px;padding:7px 10px;color:white;font-size:11px;font-family:'Inter',sans-serif;outline:none;transition:all 0.15s;}
.field-row input:focus{border-color:#3b6cf5;box-shadow:0 0 0 2px rgba(59,108,245,0.08);}
.slider-row{display:flex;flex-direction:column;gap:3px;}
.slider-row label{font-size:10px;color:rgba(255,255,255,0.48);display:flex;justify-content:space-between;font-weight:500;}
.slider-row label span{color:#5b8aff;font-weight:600;font-size:10px;}
.slider-row input[type=range]{width:100%;accent-color:#3b6cf5;cursor:pointer;height:3px;}
.tier-chip{display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:8px 10px;text-align:left;width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.055);border-radius:6px;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;color:rgba(255,255,255,0.2);}
.tier-chip:hover{background:rgba(59,108,245,0.12);color:#5b8aff;border-color:rgba(59,108,245,0.2);}
.tier-chip.active{background:rgba(59,108,245,0.12);color:#5b8aff;border-color:rgba(59,108,245,0.3);}
.tier-chip .tier-name{font-size:11px;font-weight:700;}
.tier-chip .tier-desc{font-size:9px;font-weight:400;opacity:0.55;line-height:1.3;}
.tier-chip.active .tier-name{color:#5b8aff;}
.tier-chip.active .tier-desc{opacity:0.7;}
/* Centre cards */
.centre-card{background:rgba(59,108,245,0.06);border:1px solid rgba(59,108,245,0.2);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:6px;border-left:3px solid #3b6cf5;}
.centre-card-header{display:flex;align-items:center;justify-content:space-between;font-size:9px;color:rgba(59,108,245,0.6);letter-spacing:1.2px;text-transform:uppercase;font-weight:700;}
.centre-card-header button{background:none;border:1px solid rgba(255,80,80,0.15);color:rgba(255,100,100,0.5);border-radius:4px;padding:2px 7px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;}
.centre-card-header button:hover{background:rgba(255,60,60,0.1);color:#ff6b6b;}
.add-centre-btn{background:rgba(59,108,245,0.08);border:1px dashed rgba(59,108,245,0.25);border-radius:6px;color:#3b6cf5;padding:8px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;text-transform:uppercase;font-weight:700;letter-spacing:1px;}
.add-centre-btn:hover{background:rgba(59,108,245,0.18);}
/* Node cards */
.node-item{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.055);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:6px;border-left:3px solid #333;}
.node-item-header{display:flex;align-items:center;justify-content:space-between;font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:1.2px;text-transform:uppercase;font-weight:700;}
.node-item-header button{background:none;border:1px solid rgba(255,80,80,0.15);color:rgba(255,100,100,0.5);border-radius:4px;padding:2px 7px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;}
.node-item-header button:hover{background:rgba(255,60,60,0.1);color:#ff6b6b;}
.node-row{display:flex;gap:4px;align-items:center;}
.node-row input,.node-row select{flex:1;background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.055);border-radius:5px;padding:5px 7px;color:white;font-size:10px;font-family:'Inter',sans-serif;outline:none;}
.node-row select option{background:#0c1020;}
.color-input{width:28px!important;height:24px;padding:1px!important;border-radius:5px!important;cursor:pointer;border:1px solid rgba(255,255,255,0.055)!important;background:none!important;flex:none!important;}
.add-node-btn{background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.1);border-radius:6px;color:rgba(255,255,255,0.3);padding:6px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;text-align:center;}
.add-node-btn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);}
.children-section{border-top:1px solid rgba(255,255,255,0.055);padding-top:6px;display:flex;flex-direction:column;gap:4px;margin-top:2px;}
.children-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);font-weight:700;}
.child-item{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:6px;padding:6px 7px;display:flex;flex-direction:column;gap:4px;}
.child-row{display:flex;gap:4px;align-items:center;}
.child-row input,.child-row select{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:4px;padding:4px 6px;color:rgba(255,255,255,0.75);font-size:9px;font-family:'Inter',sans-serif;outline:none;}
.child-row select option{background:#0c1020;}
.child-row button{background:none;border:1px solid rgba(255,60,60,0.1);color:rgba(255,100,100,0.4);border-radius:3px;padding:2px 5px;cursor:pointer;font-size:8px;font-family:'Inter',sans-serif;}
.add-child-btn{background:none;border:1px dashed rgba(255,255,255,0.08);border-radius:5px;color:rgba(255,255,255,0.2);padding:4px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;text-align:center;}
.add-child-btn:hover{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.48);}
.particle-row{display:flex;gap:4px;align-items:center;}
.particle-row label{font-size:9px;color:rgba(255,255,255,0.2);white-space:nowrap;font-weight:500;}
.particle-input{width:34px;background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.055);border-radius:4px;padding:3px 4px;color:white;font-size:12px;font-family:'Inter',sans-serif;outline:none;text-align:center;}
.particle-presets{display:flex;gap:2px;flex-wrap:wrap;}
.preset-btn{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:4px;padding:2px 4px;cursor:pointer;font-size:11px;line-height:1;}
.preset-btn:hover{background:rgba(255,255,255,0.08);transform:scale(1.1);}
/* Link select */
.link-section{border-top:1px solid rgba(59,108,245,0.15);padding-top:6px;display:flex;flex-direction:column;gap:4px;margin-top:2px;}
.link-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(59,108,245,0.4);font-weight:700;}
.link-check{display:flex;align-items:center;gap:6px;font-size:10px;color:rgba(255,255,255,0.5);cursor:pointer;padding:3px 0;}
.link-check input{accent-color:#3b6cf5;cursor:pointer;}
.btn-row{padding:10px 12px;border-top:1px solid rgba(255,255,255,0.055);display:flex;flex-direction:column;gap:5px;background:rgba(8,12,24,0.95);}
.generate-btn{background:#3b6cf5;border:none;border-radius:6px;color:white;padding:10px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;}
.generate-btn:hover{background:#3060e0;box-shadow:0 4px 16px rgba(59,108,245,0.3);}
.btn-secondary-row{display:flex;gap:4px;}
.btn-secondary{flex:1;background:none;border:1px solid rgba(255,255,255,0.055);border-radius:6px;color:rgba(255,255,255,0.2);padding:7px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;font-weight:600;text-transform:uppercase;}
.btn-secondary:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.48);}
.btn-secondary.ready{color:white;border-color:rgba(255,255,255,0.15);}
#status{font-size:9px;color:rgba(255,255,255,0.2);text-align:center;min-height:12px;font-weight:500;}
#main{flex:1;display:flex;flex-direction:column;position:relative;background:#0b0f1a;}
#preview-header{padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.055);display:flex;align-items:center;justify-content:space-between;}
.preview-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);font-weight:600;}
.preview-badge{font-size:9px;color:rgba(255,255,255,0.2);}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
canvas#preview{border-radius:10px;border:1px solid rgba(255,255,255,0.055);max-width:100%;max-height:100%;}
.fullscreen #sidebar,.fullscreen #preview-header{display:none;}
.fullscreen #canvas-wrap{padding:0;}
.fullscreen canvas#preview{border-radius:0;border:none;max-width:100vw;max-height:100vh;}
#fs-exit{display:none;position:fixed;top:14px;right:14px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:white;padding:7px 12px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;z-index:999;font-weight:600;}
.fullscreen #fs-exit{display:block;}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo"><div class="mark">W</div>Wagonex Builder</div>
    <div class="sidebar-version">v3.0</div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="tab-text" onclick="switchTab(this)">Content</div>
    <div class="tab" data-tab="tab-layout" onclick="switchTab(this)">Layout</div>
    <div class="tab" data-tab="tab-nodes" onclick="switchTab(this)">Platforms</div>
  </div>
  <div id="sidebar-scroll">
    <div class="tab-content active" id="tab-text">
      <div class="section">
        <div class="section-label">Copy</div>
        <div class="field-row"><label>Headline</label><input type="text" id="headline" value="Wagonex Pro" oninput="redraw()"></div>
        <div class="field-row"><label>Subheading</label><input type="text" id="subheading" value="Full network · Connect storefronts across the platform" oninput="redraw()"></div>
        <div class="field-row"><label>Footer</label><input type="text" id="tagline" value="WAGONEX PRO · FULL NETWORK ACCESS" oninput="redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Platform Tier</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <button class="tier-chip" onclick="applyPreset('lite',this)"><span class="tier-name">Lite</span><span class="tier-desc">One platform · Customers in, no inventory</span></button>
          <button class="tier-chip" onclick="applyPreset('core',this)"><span class="tier-name">Core</span><span class="tier-desc">One platform · Customers + inventory, no connections</span></button>
          <button class="tier-chip active" onclick="applyPreset('pro',this)"><span class="tier-name">Pro</span><span class="tier-desc">Multiple storefronts connected through the platform</span></button>
          <button class="tier-chip" onclick="applyPreset('marketplace',this)"><span class="tier-name">Marketplace</span><span class="tier-desc">Multiple inventory providers feed into the marketplace</span></button>
          <button class="tier-chip" onclick="applyPreset('multi',this)"><span class="tier-name">Multi-Platform</span><span class="tier-desc">Multiple Wagonex platforms linked together</span></button>
        </div>
      </div>
    </div>
    <div class="tab-content" id="tab-layout">
      <div class="section">
        <div class="section-label">Dimensions</div>
        <div class="slider-row"><label>Orbit Radius <span id="radiusVal">34%</span></label><input type="range" id="orbitRadius" min="15" max="48" value="34" oninput="document.getElementById('radiusVal').textContent=this.value+'%';redraw()"></div>
        <div class="slider-row"><label>Node Size <span id="nodeSizeVal">26px</span></label><input type="range" id="nodeSize" min="14" max="44" value="26" oninput="document.getElementById('nodeSizeVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Platform Size <span id="centerSizeVal">38px</span></label><input type="range" id="centerSize" min="20" max="64" value="38" oninput="document.getElementById('centerSizeVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Child Distance <span id="childOrbitVal">55px</span></label><input type="range" id="childOrbit" min="30" max="120" value="55" oninput="document.getElementById('childOrbitVal').textContent=this.value+'px';redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Connections</div>
        <div class="slider-row"><label>Line Weight <span id="lineWidthVal">1.0px</span></label><input type="range" id="lineWidth" min="0.5" max="6" step="0.5" value="1" oninput="document.getElementById('lineWidthVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Line Opacity <span id="lineOpVal">35%</span></label><input type="range" id="lineOpacity" min="5" max="100" value="35" oninput="document.getElementById('lineOpVal').textContent=this.value+'%';redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Particles</div>
        <div class="slider-row"><label>Size <span id="particleSizeVal">12px</span></label><input type="range" id="particleSize" min="8" max="28" value="12" oninput="document.getElementById('particleSizeVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Speed <span id="flowSpeedVal">1.0x</span></label><input type="range" id="flowSpeed" min="1" max="20" value="5" oninput="document.getElementById('flowSpeedVal').textContent=(this.value/5).toFixed(1)+'x'"></div>
        <div class="slider-row"><label>Frequency <span id="spawnRateVal">900ms</span></label><input type="range" id="spawnRate" min="200" max="3000" step="100" value="900" oninput="document.getElementById('spawnRateVal').textContent=this.value+'ms';restartSpawners()"></div>
      </div>
    </div>
    <div class="tab-content" id="tab-nodes">
      <div id="centres-container"></div>
      <button class="add-centre-btn" onclick="addCentre()">+ Add Platform</button>
    </div>
  </div>
  <div class="btn-row">
    <button class="generate-btn" onclick="startAnimation()">&#9654; Preview</button>
    <div class="btn-secondary-row">
      <button class="btn-secondary" id="dl-btn" onclick="exportGif()">&#11015; GIF</button>
      <button class="btn-secondary" onclick="toggleFullscreen()">&#9974; Present</button>
      <button class="btn-secondary" onclick="resetAll()">&#8634; Reset</button>
    </div>
    <div id="status"></div>
  </div>
</div>
<div id="main">
  <div id="preview-header">
    <div class="preview-title">Live Preview</div>
    <div class="preview-badge">Drag nodes to reposition</div>
  </div>
  <div id="canvas-wrap"><canvas id="preview"></canvas></div>
  <button id="fs-exit" onclick="toggleFullscreen()">&#10005; Exit</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
var CV = document.getElementById('preview');
var W = 700, H = 700;
var DPR = window.devicePixelRatio || 2;
CV.width = W * DPR; CV.height = H * DPR;
CV.style.width = W + 'px'; CV.style.height = H + 'px';
var ctx = CV.getContext('2d');
ctx.scale(DPR, DPR);

var COLORS = ['#2dd4a0','#5b8aff','#a77bfa','#f59e42','#facc15','#f472b6','#60a5fa','#4ade80'];
var PARTICLE_PRESETS = ['🚗','👤','📦','🔗','⭐','🏷️','💼','🔑','📋','🚙','🏎️','🚐','💰','💵','💳','🪙'];

// DATA MODEL
// centres: array of { label, x, y, nodes: [...], links: [centreIdx, ...] }
var centres = [];
var parts = [];
var animTime = 0;
var rafId = null;
var spawnTimers = [];
var gifReady = false;
var dragging = null;
var centreCustomPos = {};
var nodeCustomPos = {};

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.getElementById(el.dataset.tab).classList.add('active');
}
function toggleFullscreen() { document.body.classList.toggle('fullscreen'); }

function getS() {
  return {
    orbitR: parseFloat(document.getElementById('orbitRadius').value) / 100,
    nodeR: parseInt(document.getElementById('nodeSize').value),
    centerR: parseInt(document.getElementById('centerSize').value),
    lineW: parseFloat(document.getElementById('lineWidth').value),
    lineOp: parseInt(document.getElementById('lineOpacity').value) / 100,
    childOrbit: parseInt(document.getElementById('childOrbit').value),
    particleR: parseInt(document.getElementById('particleSize').value) / 2,
    headline: document.getElementById('headline').value,
    subheading: document.getElementById('subheading').value,
    tagline: document.getElementById('tagline').value
  };
}
function getFlowSpeed() { return parseFloat(document.getElementById('flowSpeed').value) / 5; }
function getSpawnRate() { return parseInt(document.getElementById('spawnRate').value); }

// Default positions for centres
function getDefaultCentrePos(ci, total) {
  if (total === 1) return { x: W / 2, y: H / 2 };
  var cols = Math.ceil(Math.sqrt(total));
  var rows = Math.ceil(total / cols);
  var row = Math.floor(ci / cols);
  var col = ci % cols;
  var cellW = W / (cols + 0.6);
  var cellH = H / (rows + 0.8);
  return {
    x: cellW * (col + 0.8),
    y: cellH * (row + 1)
  };
}

function getCentrePos(ci) {
  if (centreCustomPos[ci]) return centreCustomPos[ci];
  return getDefaultCentrePos(ci, centres.length);
}

function getNodePos2(ci, ni) {
  var key = ci + '_' + ni;
  if (nodeCustomPos[key]) return nodeCustomPos[key];
  var cp = getCentrePos(ci);
  var s = getS();
  var orbitR = Math.min(W, H) * s.orbitR;
  if (centres.length > 1) orbitR = Math.min(orbitR, 140);
  var count = centres[ci].nodes.length;
  var a = (ni / count) * Math.PI * 2 - Math.PI / 2;
  return { x: cp.x + Math.cos(a) * orbitR, y: cp.y + Math.sin(a) * orbitR };
}

// Hit testing
function hitTest(mx, my) {
  var s = getS();
  for (var ci = 0; ci < centres.length; ci++) {
    var cp = getCentrePos(ci);
    if (Math.abs(mx - cp.x) < s.centerR * 1.6 + 10 && Math.abs(my - cp.y) < s.centerR + 10) return { type: 'centre', ci: ci };
    for (var ni = 0; ni < centres[ci].nodes.length; ni++) {
      var np = getNodePos2(ci, ni);
      if (Math.hypot(mx - np.x, my - np.y) < s.nodeR + 12) return { type: 'node', ci: ci, ni: ni };
    }
  }
  return null;
}

function getCanvasXY(e) {
  var r = CV.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}

CV.addEventListener('mousedown', function(e) {
  var xy = getCanvasXY(e); var hit = hitTest(xy.x, xy.y);
  if (hit) { dragging = hit; CV.style.cursor = 'grabbing'; }
});
CV.addEventListener('mousemove', function(e) {
  var xy = getCanvasXY(e);
  if (dragging) {
    if (dragging.type === 'centre') centreCustomPos[dragging.ci] = { x: xy.x, y: xy.y };
    else if (dragging.type === 'node') nodeCustomPos[dragging.ci + '_' + dragging.ni] = { x: xy.x, y: xy.y };
    redraw();
  } else { CV.style.cursor = hitTest(xy.x, xy.y) ? 'grab' : 'default'; }
});
CV.addEventListener('mouseup', function() { dragging = null; CV.style.cursor = 'default'; });
CV.addEventListener('mouseleave', function() { dragging = null; });
CV.addEventListener('touchstart', function(e) { e.preventDefault(); var xy = getCanvasXY(e.touches[0]); var hit = hitTest(xy.x, xy.y); if (hit) dragging = hit; }, { passive: false });
CV.addEventListener('touchmove', function(e) { e.preventDefault(); var xy = getCanvasXY(e.touches[0]); if (dragging) { if (dragging.type === 'centre') centreCustomPos[dragging.ci] = { x: xy.x, y: xy.y }; else if (dragging.type === 'node') nodeCustomPos[dragging.ci + '_' + dragging.ni] = { x: xy.x, y: xy.y }; redraw(); } }, { passive: false });
CV.addEventListener('touchend', function() { dragging = null; });

// Icon picker
function buildIconPicker(labelTxt, val, onChange) {
  var wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;gap:3px;';
  var row = document.createElement('div'); row.className = 'particle-row';
  var lbl = document.createElement('label'); lbl.textContent = labelTxt;
  var inp = document.createElement('input'); inp.className = 'particle-input'; inp.value = val || '🚗'; inp.maxLength = 2;
  inp.oninput = function() { onChange(inp.value); redraw(); };
  row.appendChild(lbl); row.appendChild(inp);
  var pp = document.createElement('div'); pp.className = 'particle-presets';
  PARTICLE_PRESETS.forEach(function(em) {
    var pb = document.createElement('button'); pb.className = 'preset-btn'; pb.textContent = em;
    pb.onclick = function() { onChange(em); inp.value = em; redraw(); }; pp.appendChild(pb);
  });
  wrap.appendChild(row); wrap.appendChild(pp); return wrap;
}

          renderUI(); restartSpawners(); redraw();

      ndb.onclick = function() { centres[ci].nodes.splice(ni, 1); renderUI(); redraw(); };
      nr1.appendChild(nli); nr1.appendChild(nci); nr1.appendChild(ndb); nd.appendChild(nr1);
      var nr2 = document.createElement('div'); nr2.className = 'child-row';
      var nsi = document.createElement('input'); nsi.value = n.sub; nsi.placeholder = 'Sub-label';
      nsi.oninput = function() { centres[ci].nodes[ni].sub = nsi.value; redraw(); };
      nr2.appendChild(nsi); nd.appendChild(nr2);
      // Flow

      var fs = document.createElement('select');

// DRAWING
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2; }
function hexToRgb(hex) { return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) }; }

function drawLine(c, x1, y1, x2, y2, color, opacity, width) {
  var rgb = hexToRgb(color);
  var g = c.createLinearGradient(x1, y1, x2, y2);
  g.addColorStop(0, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+opacity+')');
  g.addColorStop(1, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+(opacity*0.15)+')');
  c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.strokeStyle = g; c.lineWidth = width; c.stroke();
}

function drawCentreLink(c, x1, y1, x2, y2) {
  var mx = (x1+x2)/2, my = (y1+y2)/2;
  var g = c.createLinearGradient(x1,y1,x2,y2);
  g.addColorStop(0, 'rgba(59,108,245,0.3)');
  g.addColorStop(0.5, 'rgba(59,108,245,0.12)');
  g.addColorStop(1, 'rgba(59,108,245,0.3)');
  c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2);
  c.strokeStyle = g; c.lineWidth = 2; c.setLineDash([6,6]); c.stroke(); c.setLineDash([]);
}

function drawParticle(c, x, y, r, emoji, color, alpha) {
  c.save(); c.globalAlpha = Math.max(0, alpha);
  var rgb = hexToRgb(color);
  var g = c.createRadialGradient(x,y,0,x,y,r*3);
  g.addColorStop(0, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.15)');
  g.addColorStop(1, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0)');
  c.beginPath(); c.arc(x,y,r*3,0,Math.PI*2); c.fillStyle = g; c.fill();
  c.beginPath(); c.arc(x,y,r,0,Math.PI*2);
  c.fillStyle = 'rgba(12,16,30,0.92)'; c.fill();
  c.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.6)'; c.lineWidth = 1; c.stroke();
  c.font = Math.round(r) + 'px serif'; c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = 'white'; c.fillText(emoji, x, y);
  c.restore();
}

function drawNode(c, x, y, r, color, label, sub) {
  c.save();
  var rgb = hexToRgb(color);
  var pulse = 0.06 + Math.sin(animTime*1.8 + x*0.008) * 0.03;
  c.beginPath(); c.arc(x,y,r+8,0,Math.PI*2);
  c.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+pulse+')'; c.lineWidth = 8; c.stroke();
  var g = c.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0, 'rgba('+Math.min(255,rgb.r+20)+','+Math.min(255,rgb.g+20)+','+Math.min(255,rgb.b+20)+',0.12)');
  g.addColorStop(1, 'rgba(10,14,26,0.95)');
  c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fillStyle = g; c.fill();
  c.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.5)'; c.lineWidth = 1.5; c.stroke();
  var fs = Math.max(9, Math.round(r * 0.4));
  c.font = '700 '+fs+'px Inter,sans-serif'; c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillStyle = 'rgba(0,0,0,0.7)'; c.fillText(label.toUpperCase(), x, y+r+14);
  c.fillStyle = 'rgba(255,255,255,0.95)'; c.fillText(label.toUpperCase(), x, y+r+13);
  if (sub) {
    var ss = Math.max(8, Math.round(r * 0.3));
    c.font = '600 '+ss+'px Inter,sans-serif';
    c.fillStyle = 'rgba(0,0,0,0.5)'; c.fillText(sub, x, y+r+25);
    c.fillStyle = 'rgba(255,255,255,0.45)'; c.fillText(sub, x, y+r+24);
  }
  c.restore();
}

// Square centre node
function drawSquareCentre(c, x, y, size, label) {
  c.save();
  var halfH = size;
  var halfW = size * 1.6;
  var r = 8;
  var pulse = 0.08 + Math.sin(animTime * 1.2 + x * 0.005) * 0.04;
  // Outer glow
  c.beginPath();
  roundRect(c, x-halfW-10, y-halfH-10, halfW*2+20, halfH*2+20, r+6);
  c.strokeStyle = 'rgba(59,108,245,'+pulse+')'; c.lineWidth = 12; c.stroke();
  // Body
  var g = c.createRadialGradient(x, y, 0, x, y, halfW * 1.2);
  g.addColorStop(0, '#182450'); g.addColorStop(1, '#0c1228');
  c.beginPath(); roundRect(c, x-halfW, y-halfH, halfW*2, halfH*2, r);
  c.fillStyle = g; c.fill();
  c.strokeStyle = 'rgba(59,108,245,0.55)'; c.lineWidth = 1.8; c.stroke();
  // Inner border
  c.beginPath(); roundRect(c, x-halfW*0.55, y-halfH*0.55, halfW*1.1, halfH*1.1, r-2);
  c.strokeStyle = 'rgba(59,108,245,0.08)'; c.lineWidth = 1; c.stroke();
  // Icon
  c.font = Math.round(halfH * 0.5) + 'px serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = 'white'; c.fillText('⚡', x, y);
  c.textBaseline = 'alphabetic';
  // Label
  var ls = Math.max(10, Math.round(halfH * 0.3));
  c.font = '800 '+ls+'px Inter,sans-serif';
  c.fillStyle = 'rgba(0,0,0,0.5)'; c.fillText(label.toUpperCase(), x, y + halfH + 16);
  c.fillStyle = 'rgba(91,138,255,0.95)'; c.fillText(label.toUpperCase(), x, y + halfH + 15);
  c.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y); c.arcTo(x+w, y, x+w, y+r, r);
  c.lineTo(x+w, y+h-r); c.arcTo(x+w, y+h, x+w-r, y+h, r);
  c.lineTo(x+r, y+h); c.arcTo(x, y+h, x, y+h-r, r);
  c.lineTo(x, y+r); c.arcTo(x, y, x+r, y, r);
  c.closePath();
}

function drawScene() {
  var s = getS();
  ctx.clearRect(0, 0, W, H);
  var bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.8);
  bg.addColorStop(0, '#0e1325'); bg.addColorStop(1, '#080c16');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  // Grid
  ctx.globalAlpha = 0.02; ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.5;
  for (var gx = 0; gx < W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
  for (var gy = 0; gy < H; gy += 40) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
  ctx.globalAlpha = 1;
  // Headline
  ctx.textAlign = 'center';
  ctx.font = '800 24px Inter,sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillText(s.headline, W/2, 35);
  ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fillText(s.headline, W/2, 34);
  ctx.font = '500 12px Inter,sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillText(s.subheading, W/2, 52);

  if (!centres.length) { ctx.textAlign = 'left'; return; }

  // Centre-to-centre links
  var drawnLinks = {};
  centres.forEach(function(centre, ci) {
    var cp = getCentrePos(ci);
    centre.links.forEach(function(oi) {
      var key = Math.min(ci,oi) + '_' + Math.max(ci,oi);
      if (drawnLinks[key]) return;
      drawnLinks[key] = true;
      var op = getCentrePos(oi);
      drawCentreLink(ctx, cp.x, cp.y, op.x, op.y);
    });
  });

  // Per-centre: lines, nodes, particles
  centres.forEach(function(centre, ci) {
    var cp = getCentrePos(ci);
    // Lines from centre to nodes
    centre.nodes.forEach(function(n, ni) {
      var np = getNodePos2(ci, ni);
      drawLine(ctx, cp.x, cp.y, np.x, np.y, n.color, s.lineOp, s.lineW);
    });
  });

  // Particles
  parts.forEach(function(p) {
    if (p.type === 'node') {
      var cp = getCentrePos(p.ci);
      var np = getNodePos2(p.ci, p.ni);
      var fx, fy, tx, ty;
      if (p.inward) { fx = np.x; fy = np.y; tx = cp.x; ty = cp.y; }
      else { fx = cp.x; fy = cp.y; tx = np.x; ty = np.y; }
      var et = easeInOutCubic(p.t);
      drawParticle(ctx, fx+(tx-fx)*et, fy+(ty-fy)*et, s.particleR, p.icon, p.color, Math.sin(p.t*Math.PI)*0.85);
    } else if (p.type === 'link') {
      var c1 = getCentrePos(p.from);
      var c2 = getCentrePos(p.to);
      var et2 = easeInOutCubic(p.t);
      drawParticle(ctx, c1.x+(c2.x-c1.x)*et2, c1.y+(c2.y-c1.y)*et2, s.particleR, p.icon, '#3b6cf5', Math.sin(p.t*Math.PI)*0.7);
    }
  });

  // Nodes on top
  centres.forEach(function(centre, ci) {
    centre.nodes.forEach(function(n, ni) {
      var np = getNodePos2(ci, ni);
      drawNode(ctx, np.x, np.y, s.nodeR, n.color, n.label, n.sub);
    });
  });

  // Square centres on top of everything
  centres.forEach(function(centre, ci) {
    var cp = getCentrePos(ci);
    drawSquareCentre(ctx, cp.x, cp.y, s.centerR, centre.label);
  });

  // Footer
  if (s.tagline) {
    ctx.font = '700 9px Inter,sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillText(s.tagline, W/2, H-12);
  }
  ctx.textAlign = 'left';
}

function redraw() { drawScene(); }

// Spawning
function restartSpawners() {
  spawnTimers.forEach(clearInterval); spawnTimers = [];
  centres.forEach(function(centre, ci) {
    centre.nodes.forEach(function(n, ni) {
      spawnTimers.push(setInterval(function() { spawnNodeP(ci, ni, n); }, getSpawnRate()));
    });
    // Link particles
    centre.links.forEach(function(oi) {
      if (oi > ci) {
        spawnTimers.push(setInterval(function() { spawnLinkP(ci, oi); }, getSpawnRate() * 1.5));
      }
    });
  });
}

function spawnNodeP(ci, ni, n) {
  var f = n.flow || 'both';
  var spd = (0.009 + Math.random() * 0.007) * getFlowSpeed();
  if (f === 'out' || f === 'both') parts.push({ type:'node', ci:ci, ni:ni, color:n.color, icon:n.particleIcon||'🚗', t:0, speed:spd, inward:false });
  if (f === 'in' || f === 'both') parts.push({ type:'node', ci:ci, ni:ni, color:n.color, icon:n.particleIconIn||'💰', t:0, speed:spd, inward:true });
}

function spawnLinkP(from, to) {
  var spd = (0.006 + Math.random() * 0.005) * getFlowSpeed();
  var icons = ['🚗','👤'];
  var icon = icons[Math.floor(Math.random() * icons.length)];
  parts.push({ type:'link', from:from, to:to, icon:icon, t:0, speed:spd });
  // Also spawn reverse
  parts.push({ type:'link', from:to, to:from, icon:icon, t:0, speed:spd * (0.8 + Math.random()*0.4) });
}

function startAnimation() {
  if (rafId) cancelAnimationFrame(rafId);
  spawnTimers.forEach(clearInterval); spawnTimers = [];
  parts = []; animTime = 0;
  gifReady = false;
  document.getElementById('dl-btn').classList.remove('ready');
  document.getElementById('status').textContent = '';
  // Spawn immediately
  centres.forEach(function(centre, ci) {
    centre.nodes.forEach(function(n, ni) {
      spawnNodeP(ci, ni, n);
    });
  });
  restartSpawners();
  setTimeout(function() { gifReady = true; document.getElementById('dl-btn').classList.add('ready'); }, 2000);
  loop();
}

function loop() {
  animTime += 0.016;
  parts = parts.filter(function(p) { return p.t <= 1; });
  parts.forEach(function(p) { p.t += p.speed; });
  drawScene();
  rafId = requestAnimationFrame(loop);
}

function exportGif() {
  if (!gifReady) return;
  document.getElementById('status').textContent = 'Rendering…';
  var gifW = W*2, gifH = H*2;
  var off = document.createElement('canvas'); off.width = gifW; off.height = gifH;
  var oc = off.getContext('2d');
  var gif = new GIF({ workers:2, quality:6, width:gifW, height:gifH, workerScript:'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js' });
  for (var f = 0; f < 80; f++) {
    animTime = f * 0.05;
    // Spawn particles for gif
    if (f % 4 === 0) {
      centres.forEach(function(centre, ci) {
        if (centre.nodes.length) {
          var ni = Math.floor(Math.random() * centre.nodes.length);
          spawnNodeP(ci, ni, centre.nodes[ni]);
        }
        centre.links.forEach(function(oi) { if (oi > ci && f % 8 === 0) spawnLinkP(ci, oi); });
      });
    }
    parts = parts.filter(function(p) { return p.t <= 1; });
    parts.forEach(function(p) { p.t += p.speed; });
    drawScene();
    oc.clearRect(0, 0, gifW, gifH);
    oc.drawImage(CV, 0, 0, gifW, gifH);
    gif.addFrame(oc, { delay: f === 79 ? 2500 : 80, copy: true });
  }
  gif.on('finished', function(blob) {
    document.getElementById('status').textContent = '✓ Exported';
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'wagonex-network.gif'; a.click();
    setTimeout(function() { document.getElementById('status').textContent = ''; }, 3000);
  });
  gif.render();
}

// Init
applyPreset('pro', document.querySelectorAll('.tier-chip')[2]);
</script>
</body>
