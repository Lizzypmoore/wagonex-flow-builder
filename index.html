<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0b0f1a;font-family:'Inter',sans-serif;color:rgba(255,255,255,0.88);display:flex;height:100vh;overflow:hidden;}
#sidebar{width:310px;min-width:310px;background:rgba(8,12,24,0.95);border-right:1px solid rgba(255,255,255,0.055);display:flex;flex-direction:column;overflow:hidden;}
#sidebar-scroll{flex:1;overflow-y:auto;padding:0 12px 12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.06) transparent;}
#sidebar-scroll::-webkit-scrollbar{width:4px;}
#sidebar-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:10px;}
.sidebar-header{padding:16px 14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.055);margin-bottom:10px;}
.sidebar-logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#fff;}
.sidebar-logo .mark{width:22px;height:22px;background:linear-gradient(135deg,#3b6cf5,#2952cc);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:800;}
.sidebar-version{font-size:9px;color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.055);border-radius:4px;padding:2px 6px;margin-left:auto;font-weight:500;}
.tabs{display:flex;margin:0 12px 10px;border-bottom:1px solid rgba(255,255,255,0.055);}
.tab{flex:1;text-align:center;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;padding:8px 4px 9px;cursor:pointer;color:rgba(255,255,255,0.2);transition:all 0.2s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.active{color:#5b8aff;border-bottom-color:#3b6cf5;}
.tab:hover:not(.active){color:rgba(255,255,255,0.48);}
.tab-content{display:none;}
.tab-content.active{display:flex;flex-direction:column;gap:10px;}
.section{display:flex;flex-direction:column;gap:7px;padding:10px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.055);border-radius:8px;}
.section-label{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,0.2);font-weight:700;margin-bottom:2px;}
.field-row{display:flex;flex-direction:column;gap:3px;}
.field-row label{font-size:10px;color:rgba(255,255,255,0.48);font-weight:500;}
.field-row input[type=text]{background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.055);border-radius:6px;padding:7px 10px;color:white;font-size:11px;font-family:'Inter',sans-serif;outline:none;transition:all 0.15s;}
.field-row input:focus{border-color:#3b6cf5;box-shadow:0 0 0 2px rgba(59,108,245,0.08);}
.slider-row{display:flex;flex-direction:column;gap:3px;}
.slider-row label{font-size:10px;color:rgba(255,255,255,0.48);display:flex;justify-content:space-between;font-weight:500;}
.slider-row label span{color:#5b8aff;font-weight:600;font-size:10px;}
.slider-row input[type=range]{width:100%;accent-color:#3b6cf5;cursor:pointer;height:3px;}
.pos-row{display:flex;gap:6px;align-items:center;}
.pos-row label{font-size:10px;color:rgba(255,255,255,0.2);width:12px;font-weight:600;}
.pos-row input[type=range]{flex:1;accent-color:#3b6cf5;height:3px;}
.pos-row input[type=number]{width:44px;background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.055);border-radius:5px;padding:4px;color:white;font-size:10px;font-family:'Inter',sans-serif;outline:none;text-align:center;}
.tier-chip{display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:8px 10px;text-align:left;width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.055);border-radius:6px;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;color:rgba(255,255,255,0.2);}
.tier-chip:hover{background:rgba(59,108,245,0.12);color:#5b8aff;border-color:rgba(59,108,245,0.2);}
.tier-chip.active{background:rgba(59,108,245,0.12);color:#5b8aff;border-color:rgba(59,108,245,0.3);}
.tier-chip .tier-name{font-size:11px;font-weight:700;letter-spacing:0.5px;}
.tier-chip .tier-desc{font-size:9px;font-weight:400;opacity:0.55;line-height:1.3;}
.tier-chip.active .tier-name{color:#5b8aff;}
.tier-chip.active .tier-desc{opacity:0.7;}
.node-item{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.055);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:6px;border-left:3px solid #333;transition:border-color 0.2s;}
.node-item-header{display:flex;align-items:center;justify-content:space-between;font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:1.2px;text-transform:uppercase;font-weight:700;}
.node-item-header button{background:none;border:1px solid rgba(255,80,80,0.15);color:rgba(255,100,100,0.5);border-radius:4px;padding:2px 7px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;}
.node-item-header button:hover{background:rgba(255,60,60,0.1);color:#ff6b6b;}
.node-row{display:flex;gap:4px;align-items:center;}
.node-row input,.node-row select{flex:1;background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.055);border-radius:5px;padding:5px 7px;color:white;font-size:10px;font-family:'Inter',sans-serif;outline:none;}
.node-row select option{background:#0c1020;}
.color-input{width:28px!important;height:24px;padding:1px!important;border-radius:5px!important;cursor:pointer;border:1px solid rgba(255,255,255,0.055)!important;background:none!important;flex:none!important;}
.pos-reset{background:none;border:1px solid rgba(255,255,255,0.055);border-radius:5px;color:rgba(255,255,255,0.2);font-size:9px;font-family:'Inter',sans-serif;padding:4px 8px;cursor:pointer;text-align:left;}
.pos-reset:hover{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.48);}
.children-section{border-top:1px solid rgba(255,255,255,0.055);padding-top:6px;display:flex;flex-direction:column;gap:4px;margin-top:2px;}
.children-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);font-weight:700;}
.child-item{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:6px;padding:6px 7px;display:flex;flex-direction:column;gap:4px;}
.child-row{display:flex;gap:4px;align-items:center;}
.child-row input,.child-row select{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:4px;padding:4px 6px;color:rgba(255,255,255,0.75);font-size:9px;font-family:'Inter',sans-serif;outline:none;}
.child-row select option{background:#0c1020;}
.child-row button{background:none;border:1px solid rgba(255,60,60,0.1);color:rgba(255,100,100,0.4);border-radius:3px;padding:2px 5px;cursor:pointer;font-size:8px;font-family:'Inter',sans-serif;}
.add-child-btn{background:none;border:1px dashed rgba(255,255,255,0.08);border-radius:5px;color:rgba(255,255,255,0.2);padding:4px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;text-align:center;}
.add-child-btn:hover{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.48);}
.add-node-btn{background:rgba(59,108,245,0.08);border:1px dashed rgba(59,108,245,0.2);border-radius:6px;color:#3b6cf5;padding:8px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;text-transform:uppercase;font-weight:700;letter-spacing:1px;}
.add-node-btn:hover{background:rgba(59,108,245,0.18);}
.particle-row{display:flex;gap:4px;align-items:center;}
.particle-row label{font-size:9px;color:rgba(255,255,255,0.2);white-space:nowrap;font-weight:500;}
.particle-input{width:34px;background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.055);border-radius:4px;padding:3px 4px;color:white;font-size:12px;font-family:'Inter',sans-serif;outline:none;text-align:center;}
.particle-presets{display:flex;gap:2px;flex-wrap:wrap;}
.preset-btn{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:4px;padding:2px 4px;cursor:pointer;font-size:11px;line-height:1;}
.preset-btn:hover{background:rgba(255,255,255,0.08);transform:scale(1.1);}
.btn-row{padding:10px 12px;border-top:1px solid rgba(255,255,255,0.055);display:flex;flex-direction:column;gap:5px;background:rgba(8,12,24,0.95);}
.generate-btn{background:#3b6cf5;border:none;border-radius:6px;color:white;padding:10px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;}
.generate-btn:hover{background:#3060e0;box-shadow:0 4px 16px rgba(59,108,245,0.3);}
.btn-secondary-row{display:flex;gap:4px;}
.btn-secondary{flex:1;background:none;border:1px solid rgba(255,255,255,0.055);border-radius:6px;color:rgba(255,255,255,0.2);padding:7px;cursor:pointer;font-size:9px;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.btn-secondary:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.48);}
.btn-secondary.ready{color:white;border-color:rgba(255,255,255,0.15);}
#status{font-size:9px;color:rgba(255,255,255,0.2);text-align:center;min-height:12px;font-weight:500;}
#main{flex:1;display:flex;flex-direction:column;position:relative;background:#0b0f1a;}
#preview-header{padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.055);display:flex;align-items:center;justify-content:space-between;}
.preview-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);font-weight:600;}
.preview-badge{font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:0.5px;font-weight:500;}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
canvas#preview{border-radius:10px;border:1px solid rgba(255,255,255,0.055);max-width:100%;max-height:100%;}
.fullscreen #sidebar,.fullscreen #preview-header{display:none;}
.fullscreen #canvas-wrap{padding:0;}
.fullscreen canvas#preview{border-radius:0;border:none;max-width:100vw;max-height:100vh;}
#fs-exit{display:none;position:fixed;top:14px;right:14px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:white;padding:7px 12px;cursor:pointer;font-size:10px;font-family:'Inter',sans-serif;z-index:999;font-weight:600;}
.fullscreen #fs-exit{display:block;}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo"><div class="mark">W</div>Wagonex Builder</div>
    <div class="sidebar-version">v2.1</div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="tab-text" onclick="switchTab(this)">Content</div>
    <div class="tab" data-tab="tab-layout" onclick="switchTab(this)">Layout</div>
    <div class="tab" data-tab="tab-nodes" onclick="switchTab(this)">Nodes</div>
  </div>
  <div id="sidebar-scroll">
    <div class="tab-content active" id="tab-text">
      <div class="section">
        <div class="section-label">Copy</div>
        <div class="field-row"><label>Headline</label><input type="text" id="headline" value="Wagonex Pro" oninput="redraw()"></div>
        <div class="field-row"><label>Subheading</label><input type="text" id="subheading" value="Full network · Connect storefronts across the platform" oninput="redraw()"></div>
        <div class="field-row"><label>Centre Label</label><input type="text" id="centerName" value="WAGONEX" oninput="redraw()"></div>
        <div class="field-row"><label>Footer</label><input type="text" id="tagline" value="WAGONEX PRO · FULL NETWORK ACCESS" oninput="redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Platform Tier</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <button class="tier-chip" onclick="applyPreset('lite',this)">
            <span class="tier-name">Lite</span>
            <span class="tier-desc">One storefront · Customers in, no inventory</span>
          </button>
          <button class="tier-chip" onclick="applyPreset('core',this)">
            <span class="tier-name">Core</span>
            <span class="tier-desc">One storefront · Customers + inventory, no connections</span>
          </button>
          <button class="tier-chip active" onclick="applyPreset('pro',this)">
            <span class="tier-name">Pro</span>
            <span class="tier-desc">Multiple storefronts · Vehicles &amp; customers flow across the network</span>
          </button>
          <button class="tier-chip" onclick="applyPreset('marketplace',this)">
            <span class="tier-name">Marketplace</span>
            <span class="tier-desc">Multiple inventory providers · Vehicles feed into the marketplace</span>
          </button>
        </div>
      </div>
    </div>
    <div class="tab-content" id="tab-layout">
      <div class="section">
        <div class="section-label">Centre Position</div>
        <div class="pos-row"><label>X</label><input type="range" id="cxSlider" min="10" max="90" value="50" oninput="redraw()"><input type="number" id="cxNum" min="10" max="90" value="50" oninput="document.getElementById('cxSlider').value=this.value;redraw()"></div>
        <div class="pos-row"><label>Y</label><input type="range" id="cySlider" min="10" max="90" value="50" oninput="redraw()"><input type="number" id="cyNum" min="10" max="90" value="50" oninput="document.getElementById('cySlider').value=this.value;redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Dimensions</div>
        <div class="slider-row"><label>Orbit Radius <span id="radiusVal">34%</span></label><input type="range" id="orbitRadius" min="20" max="48" value="34" oninput="document.getElementById('radiusVal').textContent=this.value+'%';redraw()"></div>
        <div class="slider-row"><label>Node Size <span id="nodeSizeVal">28px</span></label><input type="range" id="nodeSize" min="16" max="52" value="28" oninput="document.getElementById('nodeSizeVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Centre Size <span id="centerSizeVal">40px</span></label><input type="range" id="centerSize" min="24" max="70" value="40" oninput="document.getElementById('centerSizeVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Child Distance <span id="childOrbitVal">55px</span></label><input type="range" id="childOrbit" min="30" max="120" value="55" oninput="document.getElementById('childOrbitVal').textContent=this.value+'px';redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Connections</div>
        <div class="slider-row"><label>Line Weight <span id="lineWidthVal">1.0px</span></label><input type="range" id="lineWidth" min="0.5" max="6" step="0.5" value="1" oninput="document.getElementById('lineWidthVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Line Opacity <span id="lineOpVal">35%</span></label><input type="range" id="lineOpacity" min="5" max="100" value="35" oninput="document.getElementById('lineOpVal').textContent=this.value+'%';redraw()"></div>
      </div>
      <div class="section">
        <div class="section-label">Particles</div>
        <div class="slider-row"><label>Size <span id="particleSizeVal">12px</span></label><input type="range" id="particleSize" min="8" max="28" value="12" oninput="document.getElementById('particleSizeVal').textContent=this.value+'px';redraw()"></div>
        <div class="slider-row"><label>Speed <span id="flowSpeedVal">1.0x</span></label><input type="range" id="flowSpeed" min="1" max="20" value="5" oninput="document.getElementById('flowSpeedVal').textContent=(this.value/5).toFixed(1)+'x'"></div>
        <div class="slider-row"><label>Frequency <span id="spawnRateVal">900ms</span></label><input type="range" id="spawnRate" min="200" max="3000" step="100" value="900" oninput="document.getElementById('spawnRateVal').textContent=this.value+'ms';restartSpawners()"></div>
      </div>
    </div>
    <div class="tab-content" id="tab-nodes">
      <div id="nodes-container"></div>
      <button class="add-node-btn" onclick="addNode()">+ Add Node</button>
    </div>
  </div>
  <div class="btn-row">
    <button class="generate-btn" onclick="startAnimation()">&#9654; Preview</button>
    <div class="btn-secondary-row">
      <button class="btn-secondary" id="dl-btn" onclick="exportGif()">&#11015; Export GIF</button>
      <button class="btn-secondary" onclick="toggleFullscreen()">&#9974; Present</button>
      <button class="btn-secondary" onclick="resetAll()">&#8634; Reset</button>
    </div>
    <div id="status"></div>
  </div>
</div>
<div id="main">
  <div id="preview-header">
    <div class="preview-title">Live Preview</div>
    <div class="preview-badge">Drag nodes to reposition</div>
  </div>
  <div id="canvas-wrap">
    <canvas id="preview"></canvas>
  </div>
  <button id="fs-exit" onclick="toggleFullscreen()">&#10005; Exit</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
var CV = document.getElementById('preview');
var W = 660, H = 660;
var DPR = window.devicePixelRatio || 2;
CV.width = W * DPR;
CV.height = H * DPR;
CV.style.width = W + 'px';
CV.style.height = H + 'px';
var ctx = CV.getContext('2d');
ctx.scale(DPR, DPR);

var COLORS = ['#2dd4a0','#5b8aff','#a77bfa','#f59e42','#facc15','#f472b6','#60a5fa','#4ade80'];
var PARTICLE_PRESETS = ['🚗','👤','📦','🔗','⭐','🏷️','💼','🔑','📋','🚙','🏎️','🚐','💰','💵','💳','🪙'];

var nodes = [];
var parts = [];
var visibleNodes = [];
var visibleChildren = [];
var rafId = null;
var nodeRevealIdx = 0;
var spawnTimers = [];
var gifReady = false;
var customCenterPos = null;
var nodeCustomPos = {};
var childCustomPos = {};
var dragging = null;
var animTime = 0;

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById(el.dataset.tab).classList.add('active');
}

function toggleFullscreen() { document.body.classList.toggle('fullscreen'); }

function resetAll() {
  nodes = defaultNodes();
  customCenterPos = null;
  nodeCustomPos = {};
  childCustomPos = {};
  document.getElementById('cxSlider').value = 50;
  document.getElementById('cxNum').value = 50;
  document.getElementById('cySlider').value = 50;
  document.getElementById('cyNum').value = 50;
  document.getElementById('headline').value = 'Wagonex Pro';
  document.getElementById('subheading').value = 'Full network · Connect storefronts across the platform';
  document.getElementById('centerName').value = 'WAGONEX';
  document.getElementById('tagline').value = 'WAGONEX PRO · FULL NETWORK ACCESS';
  document.querySelectorAll('.tier-chip').forEach(function(c) { c.classList.remove('active'); });
  document.querySelectorAll('.tier-chip')[2].classList.add('active');
  renderNodeUI();
  startAnimation();
}

function applyPreset(name, el) {
  document.querySelectorAll('.tier-chip').forEach(function(c) { c.classList.remove('active'); });
  if (el) el.classList.add('active');
  customCenterPos = null;
  nodeCustomPos = {};
  childCustomPos = {};
  document.getElementById('cxSlider').value = 50;
  document.getElementById('cxNum').value = 50;
  document.getElementById('cySlider').value = 50;
  document.getElementById('cyNum').value = 50;

  if (name === 'lite') {
    document.getElementById('headline').value = 'Wagonex Lite';
    document.getElementById('subheading').value = 'Customer acquisition through your own storefront';
    document.getElementById('centerName').value = 'WAGONEX';
    document.getElementById('tagline').value = 'WAGONEX LITE · CUSTOMER ACQUISITION';
    nodes = [
      {label:'Your Storefront', sub:'Lite', color:'#2dd4a0', flow:'in', particleIcon:'👤', particleIconIn:'👤', children:[]}
    ];
  }
  if (name === 'core') {
    document.getElementById('headline').value = 'Wagonex Core';
    document.getElementById('subheading').value = 'Your inventory and customers on one storefront';
    document.getElementById('centerName').value = 'WAGONEX';
    document.getElementById('tagline').value = 'WAGONEX CORE · INVENTORY + CUSTOMERS';
    nodes = [
      {label:'Your Storefront', sub:'Core', color:'#5b8aff', flow:'both', particleIcon:'👤', particleIconIn:'🚗', children:[]}
    ];
  }
  if (name === 'pro') {
    document.getElementById('headline').value = 'Wagonex Pro';
    document.getElementById('subheading').value = 'Full network · Connect storefronts across the platform';
    document.getElementById('centerName').value = 'WAGONEX';
    document.getElementById('tagline').value = 'WAGONEX PRO · FULL NETWORK ACCESS';
    nodes = [
      {label:'Pro Storefront', sub:'Your dealership', color:'#2dd4a0', flow:'both', particleIcon:'👤', particleIconIn:'🚗', children:[]},
      {label:'Pro Storefront', sub:'Partner dealer', color:'#5b8aff', flow:'both', particleIcon:'🚗', particleIconIn:'👤', children:[]},
      {label:'Core Storefront', sub:'Independent', color:'#a77bfa', flow:'both', particleIcon:'👤', particleIconIn:'🚗', children:[]},
      {label:'Lite Storefront', sub:'Acquisition only', color:'#f59e42', flow:'in', particleIcon:'👤', particleIconIn:'👤', children:[]},
      {label:'Lite Storefront', sub:'Referral partner', color:'#facc15', flow:'in', particleIcon:'👤', particleIconIn:'👤', children:[]}
    ];
  }
  if (name === 'marketplace') {
    document.getElementById('headline').value = 'Wagonex Marketplace';
    document.getElementById('subheading').value = 'Multiple providers, one marketplace';
    document.getElementById('centerName').value = 'WAGONEX';
    document.getElementById('tagline').value = 'WAGONEX MARKETPLACE · AGGREGATED INVENTORY';
    nodes = [
      {label:'OEM Fleet', sub:'Manufacturer', color:'#5b8aff', flow:'in', particleIcon:'🚗', particleIconIn:'🚗', children:[]},
      {label:'Dealer Group', sub:'Multi-site', color:'#2dd4a0', flow:'in', particleIcon:'🚗', particleIconIn:'🚗', children:[]},
      {label:'Leasing Co.', sub:'Contract vehicles', color:'#a77bfa', flow:'in', particleIcon:'🚗', particleIconIn:'🚗', children:[]},

function getS() {
  var cxPct = parseFloat(document.getElementById('cxSlider').value) / 100;
  var cyPct = parseFloat(document.getElementById('cySlider').value) / 100;
  return {
    cx: customCenterPos ? customCenterPos.x : W * cxPct,
    cy: customCenterPos ? customCenterPos.y : H * cyPct,
    orbitR: parseFloat(document.getElementById('orbitRadius').value) / 100,
    nodeR: parseInt(document.getElementById('nodeSize').value),
    centerR: parseInt(document.getElementById('centerSize').value),
    lineW: parseFloat(document.getElementById('lineWidth').value),
    lineOp: parseInt(document.getElementById('lineOpacity').value) / 100,
    childOrbit: parseInt(document.getElementById('childOrbit').value),
    particleR: parseInt(document.getElementById('particleSize').value) / 2,
    headline: document.getElementById('headline').value,
    subheading: document.getElementById('subheading').value,
    centerName: document.getElementById('centerName').value || 'WAGONEX',
    tagline: document.getElementById('tagline').value
  };
}

function getFlowSpeed() { return parseFloat(document.getElementById('flowSpeed').value) / 5; }
function getSpawnRate() { return parseInt(document.getElementById('spawnRate').value); }

function getNodePos(i, cx, cy, orbitR, count) {
  if (nodeCustomPos[i]) return nodeCustomPos[i];
  var a = (i / count) * Math.PI * 2 - Math.PI / 2;
  return { x: cx + Math.cos(a) * orbitR, y: cy + Math.sin(a) * orbitR };
}

function getChildPos(ni, ci, px, py, cx, cy, childOrbit, total) {
  var key = ni + '_' + ci;
  if (childCustomPos[key]) return childCustomPos[key];
  var ba = Math.atan2(py - cy, px - cx);
  var sp = Math.min(Math.PI * 0.7, (total - 1) * 0.5);
  var t = total === 1 ? 0 : (ci / (total - 1) - 0.5);
  var a = ba + t * sp;
  return { x: px + Math.cos(a) * childOrbit, y: py + Math.sin(a) * childOrbit };
}

// Drag
function getCanvasXY(e) {
  var r = CV.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}

function hitTest(mx, my) {
  var s = getS();
  if (Math.hypot(mx - s.cx, my - s.cy) < s.centerR + 14) return { type: 'center' };
  for (var i = 0; i < visibleNodes.length; i++) {
    var p = getNodePos(i, s.cx, s.cy, Math.min(W, H) * s.orbitR, visibleNodes.length);
    if (Math.hypot(mx - p.x, my - p.y) < s.nodeR + 14) return { type: 'node', ni: i };
    var ch = visibleChildren[i] || [];
    for (var j = 0; j < ch.length; j++) {
      var cp = getChildPos(i, j, p.x, p.y, s.cx, s.cy, s.childOrbit, ch.length);
      if (Math.hypot(mx - cp.x, my - cp.y) < s.nodeR * 0.55 + 12) return { type: 'child', ni: i, ci: j };
    }
  }
  return null;
}

CV.addEventListener('mousedown', function(e) {
  var xy = getCanvasXY(e);
  var hit = hitTest(xy.x, xy.y);
  if (hit) { dragging = hit; CV.style.cursor = 'grabbing'; }
});
CV.addEventListener('mousemove', function(e) {
  var xy = getCanvasXY(e);
  if (dragging) {
    if (dragging.type === 'center') {
      customCenterPos = { x: xy.x, y: xy.y };
      document.getElementById('cxSlider').value = Math.round(xy.x / W * 100);
      document.getElementById('cxNum').value = Math.round(xy.x / W * 100);
      document.getElementById('cySlider').value = Math.round(xy.y / H * 100);
      document.getElementById('cyNum').value = Math.round(xy.y / H * 100);
    } else if (dragging.type === 'node') {
      nodeCustomPos[dragging.ni] = { x: xy.x, y: xy.y };
    } else if (dragging.type === 'child') {
      childCustomPos[dragging.ni + '_' + dragging.ci] = { x: xy.x, y: xy.y };
    }
    redraw();
  } else {
    CV.style.cursor = hitTest(xy.x, xy.y) ? 'grab' : 'default';
  }
});
CV.addEventListener('mouseup', function() { dragging = null; CV.style.cursor = 'default'; });
CV.addEventListener('mouseleave', function() { dragging = null; });
CV.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var xy = getCanvasXY(e.touches[0]);
  var hit = hitTest(xy.x, xy.y);
  if (hit) dragging = hit;
}, { passive: false });
CV.addEventListener('touchmove', function(e) {
  e.preventDefault();
  var xy = getCanvasXY(e.touches[0]);
  if (dragging) {
    if (dragging.type === 'center') customCenterPos = { x: xy.x, y: xy.y };
    else if (dragging.type === 'node') nodeCustomPos[dragging.ni] = { x: xy.x, y: xy.y };
    else if (dragging.type === 'child') childCustomPos[dragging.ni + '_' + dragging.ci] = { x: xy.x, y: xy.y };
    redraw();
  }
}, { passive: false });
CV.addEventListener('touchend', function() { dragging = null; });

// Drawing
function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return { r: r, g: g, b: b };
}

function drawLine(c, x1, y1, x2, y2, color, opacity, width) {
  var rgb = hexToRgb(color);
  var g = c.createLinearGradient(x1, y1, x2, y2);
  g.addColorStop(0, 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + opacity + ')');
  g.addColorStop(1, 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + (opacity * 0.15) + ')');
  c.beginPath();
  c.moveTo(x1, y1);
  c.lineTo(x2, y2);
  c.strokeStyle = g;
  c.lineWidth = width;
  c.stroke();
}

function drawParticle(c, x, y, r, emoji, color, alpha) {
  c.save();
  c.globalAlpha = Math.max(0, alpha);
  var rgb = hexToRgb(color);
  var g = c.createRadialGradient(x, y, 0, x, y, r * 3);
  g.addColorStop(0, 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.15)');
  g.addColorStop(1, 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0)');
  c.beginPath(); c.arc(x, y, r * 3, 0, Math.PI * 2); c.fillStyle = g; c.fill();
  c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2);
  c.fillStyle = 'rgba(12,16,30,0.92)'; c.fill();
  c.strokeStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.6)';
  c.lineWidth = 1; c.stroke();
  c.font = Math.round(r * 1) + 'px serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = 'white'; c.fillText(emoji, x, y);
  c.restore();
}

function drawNode(c, x, y, r, color, label, sub, alpha) {
  if (alpha === undefined) alpha = 1;
  c.save();
  c.globalAlpha = alpha;
  var rgb = hexToRgb(color);
  var pulse = 0.06 + Math.sin(animTime * 1.8 + x * 0.008) * 0.03;
  c.beginPath(); c.arc(x, y, r + 8, 0, Math.PI * 2);
  c.strokeStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + pulse + ')';
  c.lineWidth = 8; c.stroke();
  var g = c.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, 'rgba(' + Math.min(255, rgb.r + 20) + ',' + Math.min(255, rgb.g + 20) + ',' + Math.min(255, rgb.b + 20) + ',0.12)');
  g.addColorStop(1, 'rgba(10,14,26,0.95)');
  c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2); c.fillStyle = g; c.fill();
  c.strokeStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.5)';
  c.lineWidth = 1.5; c.stroke();
  var fontSize = Math.max(10, Math.round(r * 0.42));
  c.font = '700 ' + fontSize + 'px Inter,sans-serif';
  c.textAlign = 'center'; c.textBaseline = 'alphabetic';
  c.fillStyle = 'rgba(0,0,0,0.7)'; c.fillText(label.toUpperCase(), x, y + r + 15);
  c.fillStyle = 'rgba(255,255,255,0.95)'; c.fillText(label.toUpperCase(), x, y + r + 14);
  if (sub) {
    var subSize = Math.max(9, Math.round(r * 0.32));
    c.font = '600 ' + subSize + 'px Inter,sans-serif';
    c.fillStyle = 'rgba(0,0,0,0.5)'; c.fillText(sub, x, y + r + 27);
    c.fillStyle = 'rgba(255,255,255,0.45)'; c.fillText(sub, x, y + r + 26);
  }
  c.restore();
}

function drawCentre(c, cx, cy, cr, name) {
  var p = 0.08 + Math.sin(animTime * 1.2) * 0.04;
  c.beginPath(); c.arc(cx, cy, cr + 14, 0, Math.PI * 2);
  c.strokeStyle = 'rgba(59,108,245,' + p + ')'; c.lineWidth = 12; c.stroke();
  var g = c.createRadialGradient(cx, cy, 0, cx, cy, cr);
  g.addColorStop(0, '#182450'); g.addColorStop(1, '#0c1228');
  c.beginPath(); c.arc(cx, cy, cr, 0, Math.PI * 2); c.fillStyle = g; c.fill();
  c.strokeStyle = 'rgba(59,108,245,0.55)'; c.lineWidth = 1.8; c.stroke();
  c.beginPath(); c.arc(cx, cy, cr * 0.65, 0, Math.PI * 2);
  c.strokeStyle = 'rgba(59,108,245,0.08)'; c.lineWidth = 1; c.stroke();
  c.font = Math.round(cr * 0.5) + 'px serif';
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillStyle = 'white'; c.fillText('⚡', cx, cy);
  c.textBaseline = 'alphabetic';
  var labelSize = Math.max(11, Math.round(cr * 0.3));
  c.font = '800 ' + labelSize + 'px Inter,sans-serif';
  c.fillStyle = 'rgba(0,0,0,0.5)'; c.fillText(name.toUpperCase(), cx, cy + cr + 16);
  c.fillStyle = 'rgba(91,138,255,0.95)'; c.fillText(name.toUpperCase(), cx, cy + cr + 15);
}

function drawScene(vN, vC, pp) {
  var s = getS();
  var cx = s.cx, cy = s.cy, orbitR = Math.min(W, H) * s.orbitR;
  ctx.clearRect(0, 0, W, H);
  var bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.8);
  bg.addColorStop(0, '#0e1325'); bg.addColorStop(1, '#080c16');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  // Grid
  ctx.globalAlpha = 0.025; ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.5;
  for (var gx = 0; gx < W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
  for (var gy = 0; gy < H; gy += 40) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
  ctx.globalAlpha = 1;
  // Headline
  ctx.textAlign = 'center';
  ctx.font = '800 24px Inter,sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillText(s.headline, W / 2, 35);
  ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fillText(s.headline, W / 2, 34);
  ctx.font = '500 12px Inter,sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillText(s.subheading, W / 2, 53);
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillText(s.subheading, W / 2, 52);
  if (!vN.length) { ctx.textAlign = 'left'; return; }
  var positions = vN.map(function(_, i) { return getNodePos(i, cx, cy, orbitR, vN.length); });
  // Orbit hint
  ctx.beginPath(); ctx.arc(cx, cy, orbitR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(59,108,245,0.035)'; ctx.lineWidth = 1; ctx.setLineDash([3, 9]); ctx.stroke(); ctx.setLineDash([]);
  // Lines
  vN.forEach(function(n, i) { var p2 = positions[i]; drawLine(ctx, cx, cy, p2.x, p2.y, n.color, s.lineOp, s.lineW); });
  // Child lines + nodes
  vN.forEach(function(n, i) {
    var p2 = positions[i];
    var ch = vC[i] || [];
    ch.forEach(function(child, j) {
      var cp = getChildPos(i, j, p2.x, p2.y, cx, cy, s.childOrbit, ch.length);
      drawLine(ctx, p2.x, p2.y, cp.x, cp.y, child.color, s.lineOp * 0.6, Math.max(0.5, s.lineW * 0.6));
      drawNode(ctx, cp.x, cp.y, s.nodeR * 0.5, child.color, child.label, child.sub);
    });
  });
  // Particles
  pp.forEach(function(p2) {
    if (p2.nodeIdx >= vN.length) return;
    var pos = positions[p2.nodeIdx];
    var fx, fy, tx, ty;
    if (p2.toChild && p2.toPos) { fx = pos.x; fy = pos.y; tx = p2.toPos.x; ty = p2.toPos.y; }
    else if (p2.inward) { fx = pos.x; fy = pos.y; tx = cx; ty = cy; }
    else { fx = cx; fy = cy; tx = pos.x; ty = pos.y; }
    var et = easeInOutCubic(p2.t);
    var x = fx + (tx - fx) * et, y = fy + (ty - fy) * et;
    drawParticle(ctx, x, y, s.particleR, p2.icon || '🚗', p2.color, Math.sin(p2.t * Math.PI) * 0.85);
  });
  // Parent nodes
  vN.forEach(function(n, i) { drawNode(ctx, positions[i].x, positions[i].y, s.nodeR, n.color, n.label, n.sub); });
  // Centre
  drawCentre(ctx, cx, cy, s.centerR, s.centerName);
  // Footer
  if (s.tagline) {
    ctx.font = '700 9px Inter,sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillText(s.tagline, W / 2, H - 12);
  }
  ctx.textAlign = 'left';
}

function redraw() { drawScene(visibleNodes, visibleChildren, parts); }

function restartSpawners() {
  spawnTimers.forEach(clearInterval); spawnTimers = [];
  visibleNodes.forEach(function(n, i) {
    spawnTimers.push(setInterval(function() { spawnP(i, n.color, n.particleIcon, n.particleIconIn, n.flow); }, getSpawnRate()));
    (visibleChildren[i] || []).forEach(function(ch, j) {
      spawnTimers.push(setInterval(function() { spawnChildP(i, j, ch.color, ch.particleIcon, ch.particleIconIn, ch.flow); }, getSpawnRate() * 1.3));
    });
  });
}

function startAnimation() {
  if (rafId) cancelAnimationFrame(rafId);
  spawnTimers.forEach(clearInterval); spawnTimers = [];
  parts = []; visibleNodes = []; visibleChildren = []; nodeRevealIdx = 0; animTime = 0;
  gifReady = false;
  document.getElementById('dl-btn').classList.remove('ready');
  document.getElementById('status').textContent = '';
  revealNext();
  loop();
}

function revealNext() {
  if (nodeRevealIdx >= nodes.length) return;
  var n = nodes[nodeRevealIdx];
  visibleNodes.push(n);
  visibleChildren.push([]);
  var i = nodeRevealIdx;
  spawnTimers.push(setInterval(function() { spawnP(i, n.color, n.particleIcon, n.particleIconIn, n.flow); }, getSpawnRate()));
  spawnP(i, n.color, n.particleIcon, n.particleIconIn, n.flow);
  if (n.children.length) {
    n.children.forEach(function(ch, j) {
      setTimeout(function() {
        visibleChildren[i].push(ch);
        spawnTimers.push(setInterval(function() { spawnChildP(i, j, ch.color, ch.particleIcon, ch.particleIconIn, ch.flow); }, getSpawnRate() * 1.3));
      }, 500 + (j + 1) * 400);
    });
  }
  nodeRevealIdx++;
  var delay = 700 + (n.children.length * 400);
  if (nodeRevealIdx < nodes.length) {
    setTimeout(revealNext, delay);
  } else {
    setTimeout(function() {
      gifReady = true;
      document.getElementById('dl-btn').classList.add('ready');
    }, delay + 500);
  }
}

function spawnP(ni, color, icon, iconIn, flow) {
  var f = flow || 'both';
  var spd = (0.009 + Math.random() * 0.007) * getFlowSpeed();
  if (f === 'out' || f === 'both') parts.push({ nodeIdx: ni, color: color, icon: icon || '🚗', t: 0, speed: spd, inward: false, toChild: false });
  if (f === 'in' || f === 'both') parts.push({ nodeIdx: ni, color: color, icon: iconIn || icon || '💰', t: 0, speed: spd, inward: true, toChild: false });
}

function spawnChildP(ni, ci, color, icon, iconIn, flow) {
  var s = getS();
  var n = visibleNodes[ni];
  if (!n) return;
  var positions = visibleNodes.map(function(_, idx) { return getNodePos(idx, s.cx, s.cy, Math.min(W, H) * s.orbitR, visibleNodes.length); });
  var p = positions[ni];
  var ch = visibleChildren[ni];
  if (!ch || !ch[ci]) return;
  var cp = getChildPos(ni, ci, p.x, p.y, s.cx, s.cy, s.childOrbit, ch.length);
  var f = flow || 'out';
  var spd = (0.012 + Math.random() * 0.007) * getFlowSpeed();
  if (f === 'out' || f === 'both') parts.push({ nodeIdx: ni, color: color, icon: icon || '🚗', t: 0, speed: spd, inward: false, toChild: true, toPos: cp });
  if (f === 'in' || f === 'both') parts.push({ nodeIdx: ni, color: color, icon: iconIn || '💰', t: 0, speed: spd, inward: false, toChild: false });
}

function loop() {
  animTime += 0.016;
  parts = parts.filter(function(p) { return p.t <= 1; });
  parts.forEach(function(p) { p.t += p.speed; });
  drawScene(visibleNodes, visibleChildren, parts);
  rafId = requestAnimationFrame(loop);
}

function exportGif() {
  if (!gifReady) return;
  document.getElementById('status').textContent = 'Rendering…';
  var gifW = W * 2, gifH = H * 2;
  var off = document.createElement('canvas');
  off.width = gifW; off.height = gifH;
  var oc = off.getContext('2d');
  var gif = new GIF({ workers: 2, quality: 6, width: gifW, height: gifH, workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js' });
  var total = 80;
  var revealAt = nodes.map(function(_, i) { return Math.floor((i / nodes.length) * total * 0.65); });
  var sv = [], sch = [], sp = [], si2 = 0;
  for (var f = 0; f < total; f++) {
    animTime = f * 0.05;
    while (si2 < nodes.length && revealAt[si2] <= f) { sv.push(nodes[si2]); sch.push([]); si2++; }
    sv.forEach(function(n, i) { if (sch[i].length < n.children.length && f > revealAt[i] + 5) sch[i] = n.children.slice(0, sch[i].length + 1); });
    if (f % 5 === 0 && sv.length) {
      var ri = Math.floor(Math.random() * sv.length);
      var rn = sv[ri];
      var fl = rn.flow || 'both';
      if (fl === 'out' || fl === 'both') sp.push({ nodeIdx: ri, color: rn.color, icon: rn.particleIcon || '🚗', t: 0, speed: 0.05, inward: false, toChild: false });
      if (fl === 'in' || fl === 'both') sp.push({ nodeIdx: ri, color: rn.color, icon: rn.particleIconIn || '💰', t: 0, speed: 0.05, inward: true, toChild: false });
    }
    sp = sp.filter(function(p) { return p.t <= 1; });
    sp.forEach(function(p) { p.t += p.speed; });
    drawScene(sv, sch, sp);
    oc.clearRect(0, 0, gifW, gifH);
    oc.drawImage(CV, 0, 0, gifW, gifH);
    gif.addFrame(oc, { delay: f === total - 1 ? 2500 : 80, copy: true });
  }
  gif.on('finished', function(blob) {
    document.getElementById('status').textContent = '✓ Exported';
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'wagonex-network.gif';
    a.click();
    setTimeout(function() { document.getElementById('status').textContent = ''; }, 3000);
  });
  gif.render();
}

// Init
nodes = defaultNodes();
renderNodeUI();
startAnimation();
</script>
