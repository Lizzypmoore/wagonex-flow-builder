<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0f1a;font-family:'Inter',sans-serif;color:rgba(255,255,255,.88);display:flex;height:100vh;overflow:hidden}
#sidebar{width:330px;min-width:330px;background:rgba(8,12,24,.95);border-right:1px solid rgba(255,255,255,.055);display:flex;flex-direction:column}
#ss{flex:1;overflow-y:auto;padding:0 12px 14px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
#ss::-webkit-scrollbar{width:4px}
#ss::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:10px}
.sh{padding:14px 14px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.055);margin-bottom:10px}
.sl{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#fff}
.sl .m{width:20px;height:20px;background:linear-gradient(135deg,#3b6cf5,#2952cc);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;font-weight:800}
.sv{font-size:8px;color:rgba(255,255,255,.2);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.055);border-radius:4px;padding:2px 5px;margin-left:auto}
.tabs{display:flex;margin:0 12px 10px;border-bottom:1px solid rgba(255,255,255,.055)}
.tab{flex:1;text-align:center;font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:7px 4px 8px;cursor:pointer;color:rgba(255,255,255,.2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.a{color:#5b8aff;border-bottom-color:#3b6cf5}
.tab:hover{color:rgba(255,255,255,.4)}
.tp{display:none}.tp.a{display:flex;flex-direction:column;gap:10px}
.sec{display:flex;flex-direction:column;gap:6px;padding:9px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.055);border-radius:7px}
.secl{font-size:8px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.2);font-weight:700;margin-bottom:2px}
.fr{display:flex;flex-direction:column;gap:3px}
.fr>label{font-size:9px;color:rgba(255,255,255,.45);font-weight:500}
.fr input[type=text]{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.055);border-radius:5px;padding:6px 8px;color:white;font-size:10px;font-family:Inter,sans-serif;outline:none}
.sr{display:flex;flex-direction:column;gap:3px}
.sr>label{font-size:9px;color:rgba(255,255,255,.45);display:flex;justify-content:space-between;font-weight:500}
.sr>label span{color:#5b8aff;font-weight:600}
.sr input[type=range]{width:100%;accent-color:#3b6cf5;height:3px}
.pre{display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:7px 9px;width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.055);border-radius:6px;cursor:pointer;font-family:Inter,sans-serif;color:rgba(255,255,255,.2)}
.pre:hover{background:rgba(59,108,245,.12);color:#5b8aff;border-color:rgba(59,108,245,.2)}
.pre.a{background:rgba(59,108,245,.12);color:#5b8aff;border-color:rgba(59,108,245,.3)}
.pre b{font-size:10px;font-weight:700}
.pre small{font-size:8px;opacity:.55;line-height:1.3}
.nd{display:flex;flex-direction:column;gap:4px;padding:7px;border-radius:6px;border:1px solid rgba(255,255,255,.055);background:rgba(255,255,255,.02)}
.nd.pl{border-left:3px solid #3b6cf5;background:rgba(59,108,245,.03)}
.nd.sf{border-left:3px solid #555}
.ndh{display:flex;align-items:center;justify-content:space-between}
.ndt{font-size:7px;letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:1px 4px;border-radius:3px}
.ndt.tp2{color:rgba(59,108,245,.7);background:rgba(59,108,245,.1)}
.ndt.ts2{color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}
.ndr{background:none;border:1px solid rgba(255,80,80,.12);color:rgba(255,100,100,.45);border-radius:3px;padding:1px 5px;cursor:pointer;font-size:8px;font-family:Inter,sans-serif}
.ndr:hover{background:rgba(255,60,60,.1);color:#ff6b6b}
.rw{display:flex;gap:3px;align-items:center}
.rw input,.rw select{flex:1;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.055);border-radius:4px;padding:4px 6px;color:white;font-size:9px;font-family:Inter,sans-serif;outline:none}
.rw select option{background:#0c1020}
.ci{width:24px!important;height:20px;padding:0!important;border-radius:4px!important;cursor:pointer;border:1px solid rgba(255,255,255,.055)!important;background:none!important;flex:none!important}
.kids{margin-left:8px;padding-left:7px;border-left:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;gap:4px;margin-top:3px}
.ab{background:none;border:1px dashed rgba(255,255,255,.07);border-radius:4px;color:rgba(255,255,255,.2);padding:3px;cursor:pointer;font-size:8px;font-family:Inter,sans-serif;text-align:center}
.ab:hover{background:rgba(255,255,255,.03);color:rgba(255,255,255,.45)}
.ab.ap{border-color:rgba(59,108,245,.15);color:rgba(59,108,245,.45)}
.ab.ap:hover{background:rgba(59,108,245,.06);color:#5b8aff}
.ir{display:flex;gap:3px;align-items:center}
.ir>label{font-size:8px;color:rgba(255,255,255,.2);white-space:nowrap}
.ii{width:30px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.055);border-radius:3px;padding:2px;color:white;font-size:11px;font-family:Inter,sans-serif;outline:none;text-align:center}
.ips{display:flex;gap:2px;flex-wrap:wrap}
.ipb{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:3px;padding:1px 3px;cursor:pointer;font-size:10px;line-height:1}
.ipb:hover{background:rgba(255,255,255,.07)}
.brow{padding:9px 12px;border-top:1px solid rgba(255,255,255,.055);display:flex;flex-direction:column;gap:4px;background:rgba(8,12,24,.95)}
.gbtn{background:#3b6cf5;border:none;border-radius:6px;color:white;padding:9px;cursor:pointer;font-size:10px;font-family:Inter,sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.gbtn:hover{background:#3060e0}
.b2r{display:flex;gap:4px}
.b2{flex:1;background:none;border:1px solid rgba(255,255,255,.055);border-radius:5px;color:rgba(255,255,255,.2);padding:6px;cursor:pointer;font-size:8px;font-family:Inter,sans-serif;font-weight:600;text-transform:uppercase}
.b2:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.45)}
.b2.rdy{color:white;border-color:rgba(255,255,255,.15)}
#st{font-size:8px;color:rgba(255,255,255,.2);text-align:center;min-height:11px}
#main{flex:1;display:flex;flex-direction:column;background:#0b0f1a}
#hdr{padding:9px 18px;border-bottom:1px solid rgba(255,255,255,.055);display:flex;align-items:center;justify-content:space-between}
.ht{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);font-weight:600}
#cw{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
canvas{border-radius:8px;border:1px solid rgba(255,255,255,.055);max-width:100%;max-height:100%}
.fs #sidebar,.fs #hdr{display:none}.fs #cw{padding:0}.fs canvas{border-radius:0;border:none;max-width:100vw;max-height:100vh}
#fsx{display:none;position:fixed;top:12px;right:12px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.08);border-radius:5px;color:white;padding:6px 10px;cursor:pointer;font-size:9px;font-family:Inter,sans-serif;z-index:999}
.fs #fsx{display:block}
</style>
</head>
<body>
<div id="sidebar">
<div class="sh"><div class="sl"><div class="m">W</div>Wagonex Builder</div><div class="sv">v4.0</div></div>
<div class="tabs">
<div class="tab a" onclick="stab(this,0)">Content</div>
<div class="tab" onclick="stab(this,1)">Layout</div>
<div class="tab" onclick="stab(this,2)">Network</div>
</div>
<div id="ss">
<div class="tp a" id="p0">
<div class="sec"><div class="secl">Copy</div>
<div class="fr"><label>Headline</label><input type="text" id="i_hl" value="Wagonex Pro" oninput="draw()"></div>
<div class="fr"><label>Subheading</label><input type="text" id="i_sh" value="Full network" oninput="draw()"></div>
<div class="fr"><label>Footer</label><input type="text" id="i_tg" value="WAGONEX PRO" oninput="draw()"></div>
</div>
<div class="sec"><div class="secl">Presets</div>
<div id="presets" style="display:flex;flex-direction:column;gap:5px"></div>
</div>
</div>
<div class="tp" id="p1">
<div class="sec"><div class="secl">Dimensions</div>
<div class="sr"><label>Orbit <span id="v_or">32%</span></label><input type="range" id="i_or" min="12" max="48" value="32" oninput="document.getElementById('v_or').textContent=this.value+'%';draw()"></div>
<div class="sr"><label>Node <span id="v_ns">24px</span></label><input type="range" id="i_ns" min="12" max="44" value="24" oninput="document.getElementById('v_ns').textContent=this.value+'px';draw()"></div>
<div class="sr"><label>Platform <span id="v_cs">36px</span></label><input type="range" id="i_cs" min="18" max="60" value="36" oninput="document.getElementById('v_cs').textContent=this.value+'px';draw()"></div>
<div class="sr"><label>Child Dist <span id="v_co">50px</span></label><input type="range" id="i_co" min="25" max="100" value="50" oninput="document.getElementById('v_co').textContent=this.value+'px';draw()"></div>
</div>
<div class="sec"><div class="secl">Lines</div>
<div class="sr"><label>Weight <span id="v_lw">1.0</span></label><input type="range" id="i_lw" min="0.5" max="5" step="0.5" value="1" oninput="document.getElementById('v_lw').textContent=this.value;draw()"></div>
<div class="sr"><label>Opacity <span id="v_lo">35%</span></label><input type="range" id="i_lo" min="5" max="100" value="35" oninput="document.getElementById('v_lo').textContent=this.value+'%';draw()"></div>
</div>
<div class="sec"><div class="secl">Particles</div>

<div class="sr"><label>Speed <span id="v_fs">1.0x</span></label><input type="range" id="i_fs" min="1" max="20" value="5" oninput="document.getElementById('v_fs').textContent=(this.value/5).toFixed(1)+'x'"></div>
<div class="sr"><label>Rate <span id="v_fr">900ms</span></label><input type="range" id="i_fr" min="200" max="3000" step="100" value="900" oninput="document.getElementById('v_fr').textContent=this.value+'ms';rspawn()"></div>
</div>
</div>

<div id="tree"></div>
</div>
</div>
<div class="brow">
<button class="gbtn" onclick="go()">&#9654; Preview</button>
<div class="b2r">
<button class="b2" id="dlb" onclick="xgif()">&#11015; GIF</button>
<button class="b2" onclick="document.body.classList.toggle('fs')">&#9974; Present</button>
<button class="b2" onclick="P('pro')">&#8634; Reset</button>
</div>

</div>

<div id="hdr"><div class="ht">Live Preview</div><div class="ht">Drag to reposition</div></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
(function(){
var CV=document.getElementById('cv'),W=720,H=720,DPR=window.devicePixelRatio||2;
CV.width=W*DPR;CV.height=H*DPR;CV.style.width=W+'px';CV.style.height=H+'px';
var C=CV.getContext('2d');C.scale(DPR,DPR);
var COLS=['#2dd4a0','#5b8aff','#a77bfa','#f59e42','#facc15','#f472b6','#60a5fa','#4ade80'];
var ICS=['🚗','👤','📦','🔗','⭐','🏷️','💼','🔑','📋','🚙','🏎️','🚐','💰','💵','💳','🪙'];
var R,pos={},pts=[],at=0,raf=null,sti=[],gr=false,drg=null,uid=0;
function nid(){return '_'+(uid++)}
function S(){return{or:v('i_or')/100,nr:iv('i_ns'),cr:iv('i_cs'),lw:parseFloat(document.getElementById('i_lw').value),lo:v('i_lo')/100,co:iv('i_co'),pr:iv('i_ps')/2}}
function v(id){return parseFloat(document.getElementById(id).value)}
function iv(id){return parseInt(document.getElementById(id).value)}
function fs(){return v('i_fs')/5}
function fr(){return iv('i_fr')}
function txt(id){return document.getElementById(id).value}

// Tabs
window.stab=function(el,n){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('a')});
  document.querySelectorAll('.tp').forEach(function(t){t.classList.remove('a')});
  el.classList.add('a');
  document.getElementById('p'+n).classList.add('a');
};

// Ensure IDs
function eid(n){if(!n._id)n._id=nid();if(n.ch)n.ch.forEach(eid);if(n.kids)n.kids.forEach(eid)}

// Layout: compute default positions, use cached if dragged
function layout(){
  eid(R);
  doLayout(R,W/2,H/2,Math.min(W,H)*S().or,0);
}
function doLayout(n,cx,cy,rad,dep){
  if(!pos[n._id])pos[n._id]={x:cx,y:cy};
  var p=pos[n._id];
  // Layout children of platform nodes
  if(n.ch&&n.ch.length){
    var r2=dep===0?rad:Math.min(rad,S().co*(1.2+dep*0.2));
    for(var i=0;i<n.ch.length;i++){
      var a=(i/n.ch.length)*Math.PI*2-Math.PI/2;
      var ch=n.ch[i];
      if(!pos[ch._id])pos[ch._id]={x:p.x+Math.cos(a)*r2,y:p.y+Math.sin(a)*r2};
      doLayout(ch,pos[ch._id].x,pos[ch._id].y,r2*0.5,dep+1);
    }
  }
  // Layout kids of storefront nodes
  if(n.tp==='s'&&n.kids&&n.kids.length){
    var co=S().co*0.7;
    var pp=pos[n._id];
    var baseAngle=Math.atan2(pp.y-H/2,pp.x-W/2);
    for(var j=0;j<n.kids.length;j++){
      var kid=n.kids[j];
      if(!kid._id)kid._id=nid();
      var spread=Math.min(Math.PI*0.6,(n.kids.length-1)*0.4);
      var t=n.kids.length===1?0:(j/(n.kids.length-1)-0.5);
      var ka=baseAngle+t*spread;
      if(!pos[kid._id])pos[kid._id]={x:pp.x+Math.cos(ka)*co,y:pp.y+Math.sin(ka)*co};
    }
  }
}

// Flatten
function flat(n,dep){
  var r=[{n:n,d:dep}];
  if(n.ch)n.ch.forEach(function(c){r=r.concat(flat(c,dep+1))});
  return r;
}

// Hit test
function hit(mx,my){
  var s=S(),all=flat(R,0);
  // Check storefront kids first (topmost small circles)
  for(var j=all.length-1;j>=0;j--){
    var f2=all[j];
    if(f2.n.tp==='s'&&f2.n.kids){
      for(var k=0;k<f2.n.kids.length;k++){
        var kid=f2.n.kids[k],kp=pos[kid._id];
        if(kp){var kr=s.nr*(f2.d<=1?1:Math.pow(.75,f2.d-1))*0.55;if(Math.hypot(mx-kp.x,my-kp.y)<kr+10)return kid._id}
      }
    }
  }
  for(var i=all.length-1;i>=0;i--){
    var f=all[i],p=pos[f.n._id];if(!p)continue;
    if(f.n.tp==='p'){
      var sc=f.d===0?1:Math.pow(.7,f.d);
      if(Math.abs(mx-p.x)<s.cr*1.6*sc+10&&Math.abs(my-p.y)<s.cr*sc+10)return f.n._id;
    }else{
      var nr=s.nr*(f.d<=1?1:Math.pow(.75,f.d-1));
      if(Math.hypot(mx-p.x,my-p.y)<nr+10)return f.n._id;
    }
  }
  return null;
}
function cxy(e){var r=CV.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)}}
CV.onmousedown=function(e){var p=cxy(e),id=hit(p.x,p.y);if(id){drg=id;CV.style.cursor='grabbing'}};
CV.onmousemove=function(e){var p=cxy(e);if(drg){pos[drg]={x:p.x,y:p.y};draw()}else CV.style.cursor=hit(p.x,p.y)?'grab':'default'};
CV.onmouseup=function(){drg=null;CV.style.cursor='default'};
CV.onmouseleave=function(){drg=null};
CV.addEventListener('touchstart',function(e){e.preventDefault();var p=cxy(e.touches[0]),id=hit(p.x,p.y);if(id)drg=id},{passive:false});
CV.addEventListener('touchmove',function(e){e.preventDefault();var p=cxy(e.touches[0]);if(drg){pos[drg]={x:p.x,y:p.y};draw()}},{passive:false});
CV.addEventListener('touchend',function(){drg=null});

// Draw helpers
function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function h2r(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function rga(c,a){return'rgba('+c.r+','+c.g+','+c.b+','+a+')'}

function rrect(c,x,y,w,h,r){c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath()}

function dRect(c,x,y,sz,label,dep){
  c.save();
  var sc=dep===0?1:Math.pow(.7,dep);
  var hw=sz*1.6*sc,hh=sz*sc,cr=6;
  var p=.08+Math.sin(at*1.2+x*.005)*.04;
  c.beginPath();rrect(c,x-hw-8,y-hh-8,hw*2+16,hh*2+16,cr+4);
  c.strokeStyle='rgba(59,108,245,'+p+')';c.lineWidth=10;c.stroke();
  var g=c.createRadialGradient(x,y,0,x,y,hw*1.2);
  g.addColorStop(0,'#182450');g.addColorStop(1,'#0c1228');
  c.beginPath();rrect(c,x-hw,y-hh,hw*2,hh*2,cr);c.fillStyle=g;c.fill();
  c.strokeStyle='rgba(59,108,245,.5)';c.lineWidth=1.5;c.stroke();
  c.font=Math.max(8,Math.round(hh*.45))+'px serif';c.textAlign='center';c.textBaseline='middle';c.fillStyle='white';c.fillText('⚡',x,y);
  c.textBaseline='alphabetic';
  var ls=Math.max(8,Math.round(hh*.28));
  c.font='800 '+ls+'px Inter,sans-serif';
  c.fillStyle='rgba(0,0,0,.5)';c.fillText(label.toUpperCase(),x,y+hh+13);
  c.fillStyle='rgba(91,138,255,.95)';c.fillText(label.toUpperCase(),x,y+hh+12);
  c.restore();
}

function dCirc(c,x,y,r,col,label,sub){
  c.save();var rgb=h2r(col);
  var p=.06+Math.sin(at*1.8+x*.008)*.03;
  c.beginPath();c.arc(x,y,r+6,0,Math.PI*2);c.strokeStyle=rga(rgb,p);c.lineWidth=6;c.stroke();
  var g=c.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,rga({r:Math.min(255,rgb.r+20),g:Math.min(255,rgb.g+20),b:Math.min(255,rgb.b+20)},.12));
  g.addColorStop(1,'rgba(10,14,26,.95)');
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle=g;c.fill();
  c.strokeStyle=rga(rgb,.5);c.lineWidth=1.5;c.stroke();
  var f=Math.max(8,Math.round(r*.4));
  c.font='700 '+f+'px Inter,sans-serif';c.textAlign='center';c.textBaseline='alphabetic';
  c.fillStyle='rgba(0,0,0,.6)';c.fillText(label.toUpperCase(),x,y+r+12);
  c.fillStyle='rgba(255,255,255,.92)';c.fillText(label.toUpperCase(),x,y+r+11);
  if(sub){c.font='600 '+Math.max(7,Math.round(r*.3))+'px Inter,sans-serif';c.fillStyle='rgba(255,255,255,.4)';c.fillText(sub,x,y+r+22)}
  c.restore();
}

function dPart(c,x,y,r,em,col,al){
  c.save();c.globalAlpha=Math.max(0,al);
  var rgb=h2r(col);
  var g=c.createRadialGradient(x,y,0,x,y,r*2.5);g.addColorStop(0,rga(rgb,.15));g.addColorStop(1,rga(rgb,0));
  c.beginPath();c.arc(x,y,r*2.5,0,Math.PI*2);c.fillStyle=g;c.fill();
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fillStyle='rgba(12,16,30,.9)';c.fill();
  c.strokeStyle=rga(rgb,.5);c.lineWidth=1;c.stroke();
  c.font=Math.round(r)+'px serif';c.textAlign='center';c.textBaseline='middle';c.fillStyle='white';c.fillText(em,x,y);
  c.restore();
}

function dLine(c,x1,y1,x2,y2,col,op,w){
  var rgb=h2r(col);
  var g=c.createLinearGradient(x1,y1,x2,y2);g.addColorStop(0,rga(rgb,op));g.addColorStop(1,rga(rgb,op*.15));
  c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.strokeStyle=g;c.lineWidth=w;c.stroke();
}

function dPLink(c,x1,y1,x2,y2){
  c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);
  c.strokeStyle='rgba(59,108,245,.2)';c.lineWidth=2;c.setLineDash([5,5]);c.stroke();c.setLineDash([]);
}

// Draw all lines recursively
function drawLines(n,s){
  if(!n.ch){}else{
    var pp=pos[n._id];if(!pp)return;
    n.ch.forEach(function(ch){
      var cp=pos[ch._id];if(!cp)return;
      if(ch.tp==='p') dPLink(C,pp.x,pp.y,cp.x,cp.y);
      else dLine(C,pp.x,pp.y,cp.x,cp.y,ch.col||'#5b8aff',s.lo,s.lw);
      drawLines(ch,s);
    });
  }
  // Draw lines from storefront to its kids
  if(n.tp==='s'&&n.kids&&n.kids.length){
    var sp=pos[n._id];if(!sp)return;
    n.kids.forEach(function(kid){
      var kp=pos[kid._id];if(!kp)return;
      dLine(C,sp.x,sp.y,kp.x,kp.y,kid.col||n.col,s.lo*0.6,Math.max(0.5,s.lw*0.6));
    });
  }
}

function draw(){
  var s=S();
  layout();
  C.clearRect(0,0,W,H);
  var bg=C.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.8);bg.addColorStop(0,'#0e1325');bg.addColorStop(1,'#080c16');
  C.fillStyle=bg;C.fillRect(0,0,W,H);
  C.globalAlpha=.02;C.strokeStyle='#fff';C.lineWidth=.5;
  for(var gx=0;gx<W;gx+=40){C.beginPath();C.moveTo(gx,0);C.lineTo(gx,H);C.stroke()}
  for(var gy=0;gy<H;gy+=40){C.beginPath();C.moveTo(0,gy);C.lineTo(W,gy);C.stroke()}
  C.globalAlpha=1;
  C.textAlign='center';
  C.font='800 22px Inter,sans-serif';C.fillStyle='rgba(0,0,0,.5)';C.fillText(txt('i_hl'),W/2,33);
  C.fillStyle='rgba(255,255,255,.93)';C.fillText(txt('i_hl'),W/2,32);
  C.font='500 11px Inter,sans-serif';C.fillStyle='rgba(255,255,255,.38)';C.fillText(txt('i_sh'),W/2,50);

  drawLines(R,s);

  // Particles
  pts.forEach(function(p){
    var f=pos[p.fi],t=pos[p.ti];if(!f||!t)return;
    var e=ease(p.t);
    dPart(C,f.x+(t.x-f.x)*e,f.y+(t.y-f.y)*e,s.pr,p.ic,p.co,Math.sin(p.t*Math.PI)*.85);
  });

  // Nodes: child circles first, then storefronts, then rects on top
  var all=flat(R,0);
  // Draw storefront kids (smallest circles)
  all.forEach(function(f){
    if(f.n.tp==='s'&&f.n.kids&&f.n.kids.length){
      var nr=s.nr*(f.d<=1?1:Math.pow(.75,f.d-1))*0.55;
      f.n.kids.forEach(function(kid){
        var kp=pos[kid._id];if(!kp)return;
        dCirc(C,kp.x,kp.y,nr,kid.col||f.n.col,kid.lb,kid.sub);
      });
    }
  });
  all.forEach(function(f){
    var p=pos[f.n._id];if(!p)return;
    if(f.n.tp==='s'){
      var nr=s.nr*(f.d<=1?1:Math.pow(.75,f.d-1));
      dCirc(C,p.x,p.y,nr,f.n.col||'#5b8aff',f.n.lb,f.n.sub);
    }
  });
  all.forEach(function(f){
    var p=pos[f.n._id];if(!p)return;
    if(f.n.tp==='p') dRect(C,p.x,p.y,s.cr,f.n.lb,f.d);
  });

  var tg=txt('i_tg');
  if(tg){C.font='700 8px Inter,sans-serif';C.textAlign='center';C.fillStyle='rgba(255,255,255,.18)';C.fillText(tg,W/2,H-10)}
  C.textAlign='left';
}
window.draw=draw;

// Edges for particles
function edges(n){
  var r=[];
  if(n.ch){
    n.ch.forEach(function(ch){
      r.push({fi:n._id,ti:ch._id,nd:ch});
      r=r.concat(edges(ch));
    });
  }
  // Storefront kids
  if(n.tp==='s'&&n.kids){
    n.kids.forEach(function(kid){
      r.push({fi:n._id,ti:kid._id,nd:kid});
    });
  }
  return r;
}

function spE(e){
  var sp=(.008+Math.random()*.006)*fs();
  if(e.nd.tp==='p'){
    pts.push({fi:e.fi,ti:e.ti,ic:'🔗',co:'#3b6cf5',t:0,s:sp});
    pts.push({fi:e.ti,ti:e.fi,ic:'🔗',co:'#3b6cf5',t:0,s:sp*(.8+Math.random()*.4)});
  }else{
    var fl=e.nd.fl||'both';
    if(fl==='out'||fl==='both')pts.push({fi:e.fi,ti:e.ti,ic:e.nd.ic||'🚗',co:e.nd.col||'#5b8aff',t:0,s:sp});
    if(fl==='in'||fl==='both')pts.push({fi:e.ti,ti:e.fi,ic:e.nd.icIn||'💰',co:e.nd.col||'#5b8aff',t:0,s:sp});
  }
}

function rspawn(){
  sti.forEach(clearInterval);sti=[];
  var ee=edges(R);
  ee.forEach(function(e){sti.push(setInterval(function(){spE(e)},fr()*(e.nd.tp==='p'?1.5:1)))});
}
window.rspawn=rspawn;

function go(){
  if(raf)cancelAnimationFrame(raf);
  sti.forEach(clearInterval);sti=[];
  pts=[];at=0;gr=false;pos={};
  document.getElementById('dlb').classList.remove('rdy');
  document.getElementById('st').textContent='';
  eid(R);layout();
  rspawn();
  edges(R).forEach(spE);
  setTimeout(function(){gr=true;document.getElementById('dlb').classList.add('rdy')},2000);
  loop();
}
window.go=go;

function loop(){
  at+=.016;
  pts=pts.filter(function(p){return p.t<=1});
  pts.forEach(function(p){p.t+=p.s});
  draw();raf=requestAnimationFrame(loop);
}

// Icon picker builder
function mkIc(lbl,val,cb){
  var w=document.createElement('div');w.style.cssText='display:flex;flex-direction:column;gap:2px';
  var r=document.createElement('div');r.className='ir';
  var l=document.createElement('label');l.textContent=lbl;
  var inp=document.createElement('input');inp.className='ii';inp.value=val||'🚗';inp.maxLength=2;
  inp.oninput=function(){cb(inp.value);draw()};
  r.appendChild(l);r.appendChild(inp);
  var pp=document.createElement('div');pp.className='ips';
  ICS.forEach(function(ic){var b=document.createElement('button');b.className='ipb';b.textContent=ic;b.onclick=function(){cb(ic);inp.value=ic;draw()};pp.appendChild(b)});
  w.appendChild(r);w.appendChild(pp);return w;
}

// Tree UI — recursive
function buildUI(n,container,parent){

  var hdr=document.createElement('div');hdr.className='ndh';
  var tag=document.createElement('span');tag.className='ndt '+(n.tp==='p'?'tp2':'ts2');

  hdr.appendChild(tag);
  if(parent){
    var rb=document.createElement('button');rb.className='ndr';rb.textContent='Remove';
    rb.onclick=function(){var i=parent.ch.indexOf(n);if(i>-1){parent.ch.splice(i,1);delete pos[n._id];renderTree();go()}};
    hdr.appendChild(rb);
  }
  d.appendChild(hdr);

  var r1=document.createElement('div');r1.className='rw';

  if(n.tp==='s'){

    ci.oninput=function(){n.col=ci.value;d.style.borderLeftColor=ci.value;draw()};
    r1.appendChild(ci);
  }
  d.appendChild(r1);

  if(n.tp==='s'){
    var r2=document.createElement('div');r2.className='rw';
    var si=document.createElement('input');si.value=n.sub||'';si.placeholder='Sub-label';
    si.oninput=function(){n.sub=si.value;draw()};
    r2.appendChild(si);d.appendChild(r2);
    var r3=document.createElement('div');r3.className='rw';
    var fl=document.createElement('label');fl.style.cssText='font-size:8px;color:rgba(255,255,255,.28);white-space:nowrap';fl.textContent='Flow';
    var sel=document.createElement('select');

    sel.onchange=function(){n.fl=sel.value;renderTree();draw()};
    r3.appendChild(fl);r3.appendChild(sel);d.appendChild(r3);
    if(n.fl==='both'){
      d.appendChild(mkIc('→ Out',n.ic,function(v){n.ic=v}));

    }else{
      d.appendChild(mkIc('Icon',n.ic,function(v){n.ic=v}));
    }
    // Child nodes
    if(n.kids&&n.kids.length){
      var ckd=document.createElement('div');ckd.className='kids';
      var ckl=document.createElement('div');ckl.style.cssText='font-size:7px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.2);font-weight:700';
      ckl.textContent='CHILDREN ('+n.kids.length+')';ckd.appendChild(ckl);
      n.kids.forEach(function(kid,ki){
        var kc=document.createElement('div');kc.className='nd sf';kc.style.borderLeftColor=kid.col||n.col;
        var kh=document.createElement('div');kh.className='ndh';
        var kt=document.createElement('span');kt.className='ndt ts2';kt.textContent='CHILD';kh.appendChild(kt);
        var kr=document.createElement('button');kr.className='ndr';kr.textContent='✕';
        kr.onclick=function(){n.kids.splice(n.kids.indexOf(kid),1);delete pos[kid._id];renderTree();rspawn();draw()};
        kh.appendChild(kr);kc.appendChild(kh);
        var kr1=document.createElement('div');kr1.className='rw';
        var kli=document.createElement('input');kli.value=kid.lb;kli.placeholder='Label';
        kli.oninput=function(){kid.lb=kli.value;draw()};
        var kci=document.createElement('input');kci.type='color';kci.value=kid.col||n.col;kci.className='ci';
        kci.oninput=function(){kid.col=kci.value;kc.style.borderLeftColor=kci.value;draw()};
        kr1.appendChild(kli);kr1.appendChild(kci);kc.appendChild(kr1);
        var kr2=document.createElement('div');kr2.className='rw';
        var ksi=document.createElement('input');ksi.value=kid.sub||'';ksi.placeholder='Sub-label';
        ksi.oninput=function(){kid.sub=ksi.value;draw()};
        kr2.appendChild(ksi);kc.appendChild(kr2);
        var kr3=document.createElement('div');kr3.className='rw';
        var kfl=document.createElement('label');kfl.style.cssText='font-size:8px;color:rgba(255,255,255,.28);white-space:nowrap';kfl.textContent='Flow';
        var ksel=document.createElement('select');
        [['both','↔ Both'],['out','→ Out'],['in','← In']].forEach(function(p2){var o=document.createElement('option');o.value=p2[0];o.textContent=p2[1];if(kid.fl===p2[0])o.selected=true;ksel.appendChild(o)});
        ksel.onchange=function(){kid.fl=ksel.value;renderTree();rspawn();draw()};
        kr3.appendChild(kfl);kr3.appendChild(ksel);kc.appendChild(kr3);
        if(kid.fl==='both'){
          kc.appendChild(mkIc('→ Out',kid.ic,function(v){kid.ic=v}));
          kc.appendChild(mkIc('← In',kid.icIn,function(v){kid.icIn=v}));
        }else{
          kc.appendChild(mkIc('Icon',kid.ic,function(v){kid.ic=v}));
        }
        ckd.appendChild(kc);
      });
      d.appendChild(ckd);
    }
    var acb=document.createElement('button');acb.className='ab';acb.textContent='+ Child Node';
    acb.onclick=function(){if(!n.kids)n.kids=[];n.kids.push({tp:'s',lb:'Child',sub:'',col:n.col,fl:'out',ic:'👤',icIn:'🚗',_id:nid()});renderTree();rspawn();draw()};
    d.appendChild(acb);
  }

  // Children container
  if(n.ch&&n.ch.length){
    var kd=document.createElement('div');kd.className='kids';
    n.ch.forEach(function(ch){buildUI(ch,kd,n)});
    d.appendChild(kd);
  }

  // Add buttons
  if(n.tp==='p'){
    var btns=document.createElement('div');btns.style.cssText='display:flex;gap:3px;margin-top:3px';
    var ap=document.createElement('button');ap.className='ab ap';ap.textContent='+ Sub-Platform';
    ap.onclick=function(){if(!n.ch)n.ch=[];n.ch.push({tp:'p',lb:'Sub-Platform',_id:nid(),ch:[]});renderTree();go()};
    var as=document.createElement('button');as.className='ab';as.textContent='+ Storefront';as.style.flex='1';
    as.onclick=function(){if(!n.ch)n.ch=[];var idx=n.ch.length%COLS.length;n.ch.push({tp:'s',lb:'Storefront',sub:'',col:COLS[idx],fl:'both',ic:'👤',icIn:'🚗',_id:nid()});renderTree();rspawn();draw()};
    btns.appendChild(ap);btns.appendChild(as);d.appendChild(btns);
  }

  container.appendChild(d);
}

// GIF export
function xgif(){
  if(!gr)return;

  var gw=W*2,gh=H*2,off=document.createElement('canvas');off.width=gw;off.height=gh;

  var ee=edges(R);
  for(var f=0;f<80;f++){
    at=f*.05;
    if(f%4===0&&ee.length)spE(ee[Math.floor(Math.random()*ee.length)]);
    pts=pts.filter(function(p){return p.t<=1});
    pts.forEach(function(p){p.t+=p.s});
    draw();oc.clearRect(0,0,gw,gh);oc.drawImage(CV,0,0,gw,gh);
    gif.addFrame(oc,{delay:f===79?2500:80,copy:true});
  }
  gif.on('finished',function(blob){
    document.getElementById('st').textContent='✓ Done';
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wagonex-network.gif';a.click();
    setTimeout(function(){document.getElementById('st').textContent=''},3000);

}
